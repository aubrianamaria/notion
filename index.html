<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry → Plate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fbf7f0;
      --card: #ffffff;
      --ink: #2f2a25;
      --muted: #877f74;
      --line: #ece4d8;
      --accent: #4c8c5a;        /* herb green */
      --accent-soft: #e6f1e6;
      --warn: #d98a3d;          /* warm amber */
      --baby: #c9648a;          /* berry */
      --baby-soft: #fbe9f0;
      --shadow: 0 6px 20px rgba(70,55,30,.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Nunito', system-ui, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 90px;
    }
    h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; font-weight: 600; }

    /* ---------- Header ---------- */
    header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(251,247,240,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }
    .head-inner {
      max-width: 920px; margin: 0 auto; padding: 14px 16px 10px;
    }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand h1 { margin: 0; font-size: 1.5rem; letter-spacing: -.01em; }
    .brand .sub { color: var(--muted); font-size: .85rem; font-weight: 600; }

    /* goals bar */
    .goals { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .goals::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto; cursor: pointer; user-select: none;
      border: 1.5px solid var(--line); background: var(--card);
      color: var(--muted); font-weight: 700; font-size: .82rem;
      padding: 7px 13px; border-radius: 999px; white-space: nowrap;
      transition: .15s ease;
    }
    .chip:hover { border-color: #d9cebd; }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.baby.on { background: var(--baby); border-color: var(--baby); }

    /* ---------- Layout ---------- */
    main { max-width: 920px; margin: 0 auto; padding: 18px 16px 40px; }
    .view { display: none; }
    .view.active { display: block; animation: fade .25s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .view-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 4px 0 14px; flex-wrap: wrap; }
    .view-head h2 { margin: 0; font-size: 1.35rem; }
    .count-pill { background: var(--accent-soft); color: var(--accent); font-weight: 800; font-size: .8rem; padding: 4px 11px; border-radius: 999px; }

    /* search + actions */
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search {
      flex: 1 1 200px; min-width: 0; display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1.5px solid var(--line); border-radius: 12px; padding: 9px 13px;
    }
    .search input { border: none; outline: none; background: transparent; font: inherit; width: 100%; color: var(--ink); }
    .btn {
      cursor: pointer; border: 1.5px solid var(--line); background: var(--card); color: var(--ink);
      font-family: inherit; font-weight: 700; font-size: .82rem; padding: 9px 13px; border-radius: 12px; transition: .15s;
    }
    .btn:hover { border-color: #d9cebd; }
    .btn.ghost { color: var(--muted); }

    /* staples toggle */
    .staple-row { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: .8rem; font-weight: 700; margin: -6px 0 14px; }
    .switch { position: relative; width: 38px; height: 22px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #d9cebd; border-radius: 999px; transition: .2s; cursor: pointer; }
    .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    /* ---------- Aisle sections ---------- */
    .aisle { margin-bottom: 22px; }
    .aisle h3 { margin: 0 0 10px; font-size: 1.02rem; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    .aisle h3 .emoji { font-size: 1.1rem; }
    .aisle h3 small { font-family: 'Nunito'; font-weight: 700; color: var(--muted); font-size: .72rem; }

    /* item grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 10px; }
    .item {
      position: relative; cursor: pointer; background: var(--card); border: 2px solid var(--line);
      border-radius: 14px; overflow: hidden; transition: .15s ease; text-align: center;
    }
    .item:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .item.have { border-color: var(--accent); }
    .item .thumb { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #f3ede3; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .item .thumb .fallback { font-size: 2.4rem; filter: drop-shadow(0 2px 3px rgba(80,60,30,.18)); }

    /* category gradient tiles (no external images — consistent + instant) */
    .g-produce { background: radial-gradient(120% 120% at 30% 20%, #eaf7e2 0%, #bfe5a8 100%); }
    .g-protein { background: radial-gradient(120% 120% at 30% 20%, #fce6db 0%, #f2b196 100%); }
    .g-dairy   { background: radial-gradient(120% 120% at 30% 20%, #fdf5d8 0%, #f6dd96 100%); }
    .g-grain   { background: radial-gradient(120% 120% at 30% 20%, #f6ebd6 0%, #e3caa0 100%); }
    .g-pantry  { background: radial-gradient(120% 120% at 30% 20%, #fdecd4 0%, #f3c587 100%); }
    .g-spice   { background: radial-gradient(120% 120% at 30% 20%, #efe9e0 0%, #cdbfa6 100%); }
    /* meal-type gradients (richer, for the bigger cards) */
    .t-breakfast { background: radial-gradient(130% 130% at 25% 15%, #ffeec0 0%, #ffb36b 100%); }
    .t-lunch     { background: radial-gradient(130% 130% at 25% 15%, #d6f0cf 0%, #7fc486 100%); }
    .t-dinner    { background: radial-gradient(130% 130% at 25% 15%, #f8cba1 0%, #e8825f 100%); }
    .t-snack     { background: radial-gradient(130% 130% at 25% 15%, #ecd6f2 0%, #c389d6 100%); }
    .item .name { font-size: .76rem; font-weight: 700; padding: 6px 4px 8px; color: var(--ink); }
    .item .tick {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.85); border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center;
      font-size: .8rem; color: transparent; transition: .15s;
    }
    .item.have .tick { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ---------- Meal cards ---------- */
    .meals { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .meal {
      background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); display: flex; flex-direction: column; cursor: pointer; transition: .15s ease;
    }
    .meal:hover { transform: translateY(-3px); }
    .meal .photo { position: relative; width: 100%; aspect-ratio: 16 / 10; background: #f3ede3; overflow: hidden; }
    .meal .photo .fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3.6rem; filter: drop-shadow(0 3px 5px rgba(80,50,20,.22)); }
    .meal .ready-tag {
      position: absolute; top: 10px; left: 10px; font-size: .72rem; font-weight: 800; padding: 5px 10px; border-radius: 999px;
      background: rgba(255,255,255,.92); color: var(--ink); box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }
    .meal .ready-tag.ready { background: var(--accent); color: #fff; }
    .meal .ready-tag.close { background: var(--warn); color: #fff; }
    .meal .type-tag {
      position: absolute; top: 10px; right: 10px; font-size: .68rem; font-weight: 800; text-transform: capitalize;
      padding: 5px 9px; border-radius: 999px; background: rgba(47,42,37,.7); color: #fff; backdrop-filter: blur(2px);
    }
    .meal .body { padding: 13px 15px 16px; display: flex; flex-direction: column; gap: 9px; flex: 1; }
    .meal h3 { margin: 0; font-size: 1.12rem; line-height: 1.2; }
    .meal .meta { display: flex; gap: 12px; color: var(--muted); font-size: .78rem; font-weight: 700; }
    .nutri { display: flex; flex-wrap: wrap; gap: 6px; }
    .nutri .badge { font-size: .7rem; font-weight: 800; padding: 3px 8px; border-radius: 7px; background: #f3ede3; color: #6b6357; }
    .nutri .badge.good { background: var(--accent-soft); color: var(--accent); }
    .baby-flag { display: inline-flex; align-items: center; gap: 5px; font-size: .74rem; font-weight: 800; color: var(--baby); background: var(--baby-soft); padding: 4px 9px; border-radius: 8px; align-self: flex-start; }
    .ingline { font-size: .8rem; color: var(--muted); margin-top: auto; }
    .ingline .miss { color: var(--warn); font-weight: 800; }
    .ingline .allset { color: var(--accent); font-weight: 800; }

    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty .big { font-size: 3rem; margin-bottom: 8px; }
    .empty h3 { color: var(--ink); margin: 0 0 6px; }

    /* ---------- Modal ---------- */
    .modal-bg { position: fixed; inset: 0; background: rgba(40,32,22,.55); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--bg); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto;
      border-radius: 22px 22px 0 0; animation: slideup .28s ease;
    }
    @media (min-width: 600px) { .modal-bg { align-items: center; } .modal { border-radius: 22px; max-height: 88vh; } }
    @keyframes slideup { from { transform: translateY(40px); opacity: .6; } to { transform: none; opacity: 1; } }
    .modal .hero { position: relative; aspect-ratio: 16/9; background: #f3ede3; overflow: hidden; }
    .modal .hero .fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; filter: drop-shadow(0 4px 6px rgba(80,50,20,.22)); }
    .modal .close { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,.92); font-size: 1.2rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .modal .inner { padding: 18px 20px 30px; }
    .modal h2 { margin: 0 0 4px; font-size: 1.5rem; }
    .modal .sub { color: var(--muted); font-weight: 700; font-size: .85rem; margin-bottom: 14px; }
    .modal section { margin-top: 18px; }
    .modal section h4 { font-family: 'Fraunces'; margin: 0 0 9px; font-size: 1.05rem; }
    .ing-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 6px; }
    .ing-list li { display: flex; align-items: center; gap: 9px; font-size: .9rem; padding: 7px 11px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; }
    .ing-list li .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
    .ing-list li.have .dot { background: var(--accent); }
    .ing-list li.need .dot { background: var(--warn); }
    .ing-list li .tag-need { margin-left: auto; font-size: .7rem; font-weight: 800; color: var(--warn); }
    .ing-list li .tag-staple { margin-left: auto; font-size: .68rem; font-weight: 700; color: var(--muted); }
    .steps { padding-left: 20px; margin: 0; display: grid; gap: 8px; }
    .steps li { font-size: .9rem; }
    .baby-box { background: var(--baby-soft); border: 1px solid #f2cfdd; border-radius: 12px; padding: 13px 15px; }
    .baby-box h4 { color: var(--baby); }
    .baby-box p { margin: 0; font-size: .88rem; color: #7a4456; }
    .nutri-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .nutri-grid .n { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .nutri-grid .n b { display: block; font-size: 1.15rem; font-family: 'Fraunces'; }
    .nutri-grid .n span { font-size: .68rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }

    /* ---------- Bottom nav ---------- */
    nav.tabs {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: rgba(255,255,255,.96); backdrop-filter: blur(10px); border-top: 1px solid var(--line);
      display: flex; justify-content: center; gap: 6px; padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    }
    nav.tabs button {
      flex: 1; max-width: 200px; border: none; background: transparent; cursor: pointer; font-family: inherit;
      color: var(--muted); font-weight: 800; font-size: .78rem; padding: 6px 4px; border-radius: 12px; transition: .15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    nav.tabs button .ic { font-size: 1.3rem; }
    nav.tabs button.on { color: var(--accent); }
    nav.tabs button.on .ic { transform: translateY(-1px); }
    nav.tabs button .nav-badge { font-size: .62rem; background: var(--accent); color: #fff; border-radius: 999px; padding: 0 6px; font-weight: 800; }
    /* custom photo layered over a gradient tile */
    .thumb .ph, .meal .photo .ph, .modal .hero .ph { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* edit pencil on item cards */
    .item .edit-badge { position: absolute; top: 6px; left: 6px; width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,.9); border: 1.5px solid var(--line); font-size: .72rem; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; color: #6b6357; z-index: 3; }
    .item .edit-badge:hover { background: #fff; border-color: var(--accent); color: var(--accent); }

    /* editor forms */
    .modal .editor { padding: 20px 20px 34px; }
    .modal .editor h2 { margin: 0 0 16px; font-size: 1.4rem; }
    .form-field { margin-bottom: 14px; }
    .form-field > label { display: block; font-weight: 800; font-size: .82rem; color: var(--ink); margin-bottom: 5px; }
    .form-field input[type=text], .form-field input[type=number], .form-field select, .form-field textarea {
      width: 100%; font: inherit; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--card); color: var(--ink); }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline: none; border-color: var(--accent); }
    .form-field textarea { min-height: 92px; resize: vertical; line-height: 1.5; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-field { flex: 1; }
    .form-row .form-field > label.hint { font-weight: 700; }
    .hint { font-size: .74rem; color: var(--muted); margin-top: 4px; font-weight: 600; }
    .check-line { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: .92rem; cursor: pointer; }
    .check-line input { width: 18px; height: 18px; }
    .uploader { display: flex; gap: 12px; align-items: center; }
    .uploader .preview { width: 74px; height: 74px; border-radius: 12px; flex: 0 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 1.5px solid var(--line); background: #f3ede3; }
    .uploader .preview img { width: 100%; height: 100%; object-fit: cover; }
    .uploader .up-actions { display: flex; flex-direction: column; gap: 6px; }
    .file-btn { cursor: pointer; margin: 0; }
    .ing-picker { max-height: 240px; overflow-y: auto; border: 1.5px solid var(--line); border-radius: 12px; padding: 6px; background: var(--card); }
    .ing-picker .grp { font-weight: 800; font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 8px 6px 3px; }
    .ing-pick { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; cursor: pointer; font-size: .88rem; }
    .ing-pick:hover { background: var(--accent-soft); }
    .ing-pick input { width: 17px; height: 17px; flex: 0 0 auto; }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 12px 16px; font-weight: 800; font-family: inherit; cursor: pointer; flex: 1; font-size: .92rem; }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-cancel { background: var(--card); color: var(--ink); border: 1.5px solid var(--line); border-radius: 12px; padding: 12px 16px; font-weight: 800; font-family: inherit; cursor: pointer; }
    .btn-delete { background: #fbe9e9; color: #c0392b; border: 1.5px solid #f0cccc; border-radius: 12px; padding: 12px 14px; font-weight: 800; font-family: inherit; cursor: pointer; }
    .meal-edit-actions { display: flex; gap: 10px; margin-top: 22px; border-top: 1px solid var(--line); padding-top: 18px; }
    .meal-edit-actions button { flex: 1; }
  </style>
</head>
<body>
  <header>
    <div class="head-inner">
      <div class="brand">
        <h1>Pantry&nbsp;→&nbsp;Plate</h1>
        <span class="sub">what's in the kitchen, what's for dinner</span>
      </div>
      <div class="goals" id="goals"></div>
    </div>
  </header>

  <main>
    <!-- PANTRY VIEW -->
    <section class="view" id="view-pantry">
      <div class="view-head">
        <h2>Your Pantry</h2>
        <span class="count-pill" id="pantry-count">0 on hand</span>
      </div>
      <div class="toolbar">
        <label class="search">
          🔍 <input id="item-search" placeholder="Search groceries…" autocomplete="off" />
        </label>
        <button class="btn" id="add-item">➕ Add item</button>
        <button class="btn ghost" id="clear-pantry">Clear all</button>
      </div>
      <div class="staple-row">
        <label class="switch"><input type="checkbox" id="staples-toggle" checked /><span class="slider"></span></label>
        Assume basic staples on hand (salt, pepper, oil, water)
      </div>
      <div id="aisles"></div>
      <div style="text-align:center;margin-top:28px">
        <button class="btn ghost" id="restore-defaults" style="font-size:.74rem">↩︎ Restore default catalog</button>
      </div>
    </section>

    <!-- MEALS VIEW -->
    <section class="view" id="view-meals">
      <div class="view-head">
        <h2>Meal Ideas</h2>
        <span class="count-pill" id="meals-count">0 meals</span>
      </div>
      <div class="toolbar">
        <button class="btn" id="add-meal">➕ Add your own meal</button>
      </div>
      <div id="meals-list"></div>
    </section>
  </main>

  <nav class="tabs">
    <button data-view="pantry" class="on"><span class="ic">🧺</span>Pantry</button>
    <button data-view="meals"><span class="ic">🍽️</span><span>Meals <span class="nav-badge" id="nav-meal-badge" style="display:none">0</span></span></button>
  </nav>

  <!-- MEAL MODAL -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal" id="modal"></div>
  </div>

  <script>
  /* =========================================================
     DATA — grocery items
     img keyword feeds a stable stock photo; emoji is fallback
     staple:true  → assumed on hand when the staples toggle is on
     ========================================================= */
  const AISLES = [
    { id: 'produce',  name: 'Produce',        emoji: '🥬' },
    { id: 'protein',  name: 'Proteins',       emoji: '🍗' },
    { id: 'dairy',    name: 'Dairy & Eggs',   emoji: '🧀' },
    { id: 'grain',    name: 'Grains & Bread', emoji: '🍞' },
    { id: 'pantry',   name: 'Pantry',         emoji: '🥫' },
    { id: 'spice',    name: 'Spices & Basics', emoji: '🧂' },
  ];

  const DEFAULT_ITEMS = [
    // produce
    { id:'banana', name:'Banana', aisle:'produce', emoji:'🍌', kw:'banana' },
    { id:'apple', name:'Apple', aisle:'produce', emoji:'🍎', kw:'apple' },
    { id:'avocado', name:'Avocado', aisle:'produce', emoji:'🥑', kw:'avocado' },
    { id:'spinach', name:'Spinach', aisle:'produce', emoji:'🥬', kw:'spinach' },
    { id:'broccoli', name:'Broccoli', aisle:'produce', emoji:'🥦', kw:'broccoli' },
    { id:'carrot', name:'Carrots', aisle:'produce', emoji:'🥕', kw:'carrots' },
    { id:'sweetpotato', name:'Sweet Potato', aisle:'produce', emoji:'🍠', kw:'sweet-potato' },
    { id:'potato', name:'Potato', aisle:'produce', emoji:'🥔', kw:'potato' },
    { id:'tomato', name:'Tomato', aisle:'produce', emoji:'🍅', kw:'tomato' },
    { id:'onion', name:'Onion', aisle:'produce', emoji:'🧅', kw:'onion' },
    { id:'garlic', name:'Garlic', aisle:'produce', emoji:'🧄', kw:'garlic', staple:true },
    { id:'bellpepper', name:'Bell Pepper', aisle:'produce', emoji:'🫑', kw:'bell-pepper' },
    { id:'zucchini', name:'Zucchini', aisle:'produce', emoji:'🥒', kw:'zucchini' },
    { id:'cucumber', name:'Cucumber', aisle:'produce', emoji:'🥒', kw:'cucumber' },
    { id:'lemon', name:'Lemon', aisle:'produce', emoji:'🍋', kw:'lemon' },
    { id:'lime', name:'Lime', aisle:'produce', emoji:'🍈', kw:'lime' },
    { id:'berries', name:'Berries', aisle:'produce', emoji:'🫐', kw:'berries' },
    { id:'mushroom', name:'Mushrooms', aisle:'produce', emoji:'🍄', kw:'mushrooms' },
    { id:'peas', name:'Frozen Peas', aisle:'produce', emoji:'🟢', kw:'green-peas' },

  const LS_HAVE = 'p2p_have_v1';
  const LS_STAPLES = 'p2p_staples_v1';
  const LS_CATALOG = 'p2p_catalog_v1';
  let have = new Set(JSON.parse(localStorage.getItem(LS_HAVE) || '[]'));
  let assumeStaples = JSON.parse(localStorage.getItem(LS_STAPLES) ?? 'true');
  let activeGoals = new Set();
  let itemFilter = '';
  let currentView = 'pantry';

  // Editable catalog: built-in defaults are the seed; the user's added/edited
  // items & meals live in localStorage and take over once present.
  let items = [], meals = [], ITEM_BY_ID = {}, pendingImg = null;
  const clone = x => JSON.parse(JSON.stringify(x));
  function reindex() { ITEM_BY_ID = Object.fromEntries(items.map(i => [i.id, i])); }
  function loadCatalog() {
    const raw = localStorage.getItem(LS_CATALOG);
    if (raw) {
      try { const c = JSON.parse(raw); items = c.items || []; meals = c.meals || []; }
      catch (e) { items = clone(DEFAULT_ITEMS); meals = clone(DEFAULT_MEALS); }
    } else { items = clone(DEFAULT_ITEMS); meals = clone(DEFAULT_MEALS); }
    reindex();
  }
  function saveCatalog() { reindex(); localStorage.setItem(LS_CATALOG, JSON.stringify({ items, meals })); }
  function persist() {
    try { saveCatalog(); return true; }
    catch (e) { alert('Couldn’t save — you may have added too many large photos. Try smaller images, or paste an image URL instead.'); return false; }
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
  function uid(name) {
    const base = (name || 'item').toLowerCase().replace(/[^a-z0-9]+/g, '').slice(0, 16) || 'item';
    let id = base, n = 1;
    while (ITEM_BY_ID[id] || meals.some(m => m.id === id)) id = base + (++n);
    return id;
  }
  // shrink an uploaded image to keep localStorage small, then hand back a data URL
  function fileToResizedDataURL(file, max, cb) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width >= height && width > max) { height = Math.round(height * max / width); width = max; }
        else if (height > width && height > max) { width = Math.round(width * max / height); height = max; }
        const c = document.createElement('canvas'); c.width = width; c.height = height;
        c.getContext('2d').drawImage(img, 0, 0, width, height);
        try { cb(c.toDataURL('image/jpeg', 0.82)); } catch (err) { cb(null); }
      };
      img.onerror = () => cb(null);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

    { id:'veg',         label:'🌱 Vegetarian',   test:m => !!m.veg },
    { id:'quick',       label:'⚡ Quick (≤20m)', test:m => m.time <= 20 },
    { id:'baby',        label:'👶 For baby',     test:m => m.baby && m.baby.ok, baby:true },
  ];

  function save() {
    localStorage.setItem(LS_HAVE, JSON.stringify([...have]));
    localStorage.setItem(LS_STAPLES, JSON.stringify(assumeStaples));
  }
  // gradient tile class for each pantry aisle / meal type (no external images)
  function aisleClass(aisleId) { return 'g-' + aisleId; }
  function typeClass(type) { return 't-' + type; }

  /* a pantry item counts as "have" if checked, or if it's a staple and the toggle is on */
  function hasItem(id) {
    if (have.has(id)) return true;
    if (assumeStaples && ITEM_BY_ID[id] && ITEM_BY_ID[id].staple) return true;
    return false;
  }

  function mealStatus(m) {
    const ing = (m.ing || []).filter(id => ITEM_BY_ID[id]); // ignore any deleted items
    const total = ing.length;
    const haveCount = ing.filter(hasItem).length;
    const missing = ing.filter(id => !hasItem(id));
    return { total, haveCount, missing, ratio: total ? haveCount/total : 0, ready: missing.length === 0 };
  }

  /* =========================================================
     RENDER — goals bar
     ========================================================= */
  function renderGoals() {
    const el = document.getElementById('goals');
    el.innerHTML = '';
    GOALS.forEach(g => {
      const c = document.createElement('div');
      c.className = 'chip' + (g.baby ? ' baby' : '') + (activeGoals.has(g.id) ? ' on' : '');
      c.textContent = g.label;
      c.onclick = () => {
        activeGoals.has(g.id) ? activeGoals.delete(g.id) : activeGoals.add(g.id);
        renderGoals(); renderMeals();
      };
      el.appendChild(c);
    });
  }

  /* =========================================================
     RENDER — pantry
     ========================================================= */
  function renderPantry() {
    const wrap = document.getElementById('aisles');
    wrap.innerHTML = '';
    const q = itemFilter.trim().toLowerCase();

    AISLES.forEach(aisle => {
      const list = items.filter(i => i.aisle === aisle.id && (!q || i.name.toLowerCase().includes(q)));
      if (!list.length) return;
      const sec = document.createElement('div');
      sec.className = 'aisle';
      const haveN = list.filter(i => have.has(i.id)).length;
      sec.innerHTML = `<h3><span class="emoji">${aisle.emoji}</span> ${aisle.name} <small>${haveN}/${list.length}</small></h3>`;
      const grid = document.createElement('div');
      grid.className = 'grid';
      list.forEach(i => grid.appendChild(itemCard(i)));
      sec.appendChild(grid);
      wrap.appendChild(sec);
    });

    if (!wrap.children.length) {
      wrap.innerHTML = `<div class="empty"><div class="big">🔍</div><h3>No matches</h3><p>Nothing matches “${itemFilter}”.</p></div>`;
    }
    document.getElementById('pantry-count').textContent = `${have.size} on hand`;
  }

  function itemCard(i) {
    const card = document.createElement('div');
    card.className = 'item' + (have.has(i.id) ? ' have' : '');
    const ph = i.img ? `<img class="ph" src="${esc(i.img)}" alt="" onerror="this.style.display='none'">` : '';
    card.innerHTML = `
      <div class="thumb ${aisleClass(i.aisle)}">
        <span class="fallback">${i.emoji || '🛒'}</span>
        ${ph}
        <button class="edit-badge" title="Edit item">✎</button>
        <div class="tick">✓</div>
      </div>
      <div class="name">${esc(i.name)}</div>`;
    card.querySelector('.edit-badge').onclick = (e) => { e.stopPropagation(); openItemEditor(i.id); };
    card.onclick = () => {
      have.has(i.id) ? have.delete(i.id) : have.add(i.id);
      save();
      card.classList.toggle('have');
      updateCounts();
    };
    return card;
  }

  /* =========================================================
     RENDER — meals
     ========================================================= */
  function renderMeals() {
    document.getElementById('meals-list').innerHTML = '';

    let list = meals.slice();
    // apply goal filters
    GOALS.forEach(g => { if (activeGoals.has(g.id)) list = list.filter(g.test); });

    // attach status, sort by readiness then ratio then fewer missing
    list = list.map(m => ({ m, s: mealStatus(m) }))
               .sort((a,b) => (b.s.ratio - a.s.ratio) || (a.s.missing.length - b.s.missing.length) || (a.m.time - b.m.time));

    const readyN = list.filter(x => x.s.ready).length;
    document.getElementById('meals-count').textContent =
      `${list.length} meal${list.length!==1?'s':''}${readyN ? ' · ' + readyN + ' ready' : ''}`;

    const wrap = document.getElementById('meals-list');
    if (!list.length) {
      wrap.innerHTML = `<div class="empty"><div class="big">🍽️</div><h3>No meals match those goals</h3><p>Try turning off a filter, checking more pantry items, or adding your own meal above.</p></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'meals';
    list.forEach(({m,s}) => grid.appendChild(mealCard(m,s)));
    wrap.appendChild(grid);
  }

  function badges(m) {
    const out = [];
    out.push(`<span class="badge ${m.nutri.protein>=25?'good':''}">${m.nutri.protein}g protein</span>`);
    out.push(`<span class="badge ${m.nutri.kcal<=380?'good':''}">${m.nutri.kcal} cal</span>`);
    out.push(`<span class="badge ${m.nutri.sodium<=400?'good':''}">${m.nutri.sodium}mg Na</span>`);
    out.push(`<span class="badge ${m.nutri.fiber>=6?'good':''}">${m.nutri.fiber}g fiber</span>`);
    return out.join('');
  }

  function mealCard(m, s) {
    const card = document.createElement('div');
    card.className = 'meal';
    let tag, cls;
    if (s.ready) { tag = '✓ Ready to cook'; cls = 'ready'; }
    else if (s.missing.length <= 2) { tag = `Almost — need ${s.missing.length}`; cls = 'close'; }
    else { tag = `${s.haveCount}/${s.total} on hand`; cls = ''; }

    let ingText;
    if (s.total === 0) ingText = `<span class="miss">No ingredients set — tap to edit</span>`;
    else if (s.ready) ingText = `<span class="allset">You have everything ✨</span>`;
    else ingText = `Just need <span class="miss">${s.missing.map(id => esc(ITEM_BY_ID[id].name)).join(', ')}</span>`;

    const ph = m.img ? `<img class="ph" src="${esc(m.img)}" alt="" onerror="this.style.display='none'">` : '';
    card.innerHTML = `
      <div class="photo ${typeClass(m.type)}">
        <div class="fallback">${m.emoji || '🍽️'}</div>
        ${ph}
        <span class="ready-tag ${cls}">${tag}</span>
        <span class="type-tag">${esc(m.type)}</span>
      </div>
      <div class="body">
        <h3>${esc(m.name)}</h3>
        <div class="meta"><span>⏱ ${m.time} min</span><span>🍽 ${m.servings} servings</span></div>
        <div class="nutri">${badges(m)}</div>
        ${m.baby && m.baby.ok ? '<span class="baby-flag">👶 Baby-friendly (12 mo+)</span>' : ''}
        <div class="ingline">${ingText}</div>
      </div>`;
    card.onclick = () => openModal(m, mealStatus(m));
    return card;
  }

  /* =========================================================
     MODAL
     ========================================================= */
  function openModal(m, s) {
    const el = document.getElementById('modal');
    const ingItems = (m.ing || []).filter(id => ITEM_BY_ID[id]).map(id => {
      const it = ITEM_BY_ID[id];
      const got = hasItem(id);
      const staple = it.staple && !have.has(id) && assumeStaples;
      return `<li class="${got?'have':'need'}">
        <span class="dot"></span>${it.emoji || ''} ${esc(it.name)}
        ${got ? (staple ? '<span class="tag-staple">staple</span>' : '') : '<span class="tag-need">need</span>'}
      </li>`;
    }).join('') || '<li class="need"><span class="dot"></span>No ingredients set yet</li>';
    const ph = m.img ? `<img class="ph" src="${esc(m.img)}" alt="">` : '';

    el.innerHTML = `
      <div class="hero ${typeClass(m.type)}">
        <div class="fallback">${m.emoji || '🍽️'}</div>
        ${ph}
        <button class="close" onclick="closeModal()">✕</button>
      </div>
      <div class="inner">
        <h2>${esc(m.name)}</h2>
        <div class="sub">${esc(m.type)} · ⏱ ${m.time} min · 🍽 ${m.servings} servings${m.veg?' · 🌱 vegetarian':''}</div>

        <div class="nutri-grid">
          <div class="n"><b>${m.nutri.kcal}</b><span>calories</span></div>
          <div class="n"><b>${m.nutri.protein}g</b><span>protein</span></div>
          <div class="n"><b>${m.nutri.sodium}</b><span>mg sodium</span></div>
          <div class="n"><b>${m.nutri.fiber}g</b><span>fiber</span></div>
        </div>

        <section>
          <h4>Ingredients ${s.total===0 ? '' : (s.ready ? '· you have it all ✨' : '· need '+s.missing.length)}</h4>
          <ul class="ing-list">${ingItems}</ul>
        </section>

        ${(m.steps && m.steps.length) ? `
        <section>
          <h4>How to make it</h4>
          <ol class="steps">${m.steps.map(st=>`<li>${esc(st)}</li>`).join('')}</ol>
        </section>` : ''}

        ${m.baby && m.baby.ok && m.baby.note ? `
        <section>
          <div class="baby-box">
            <h4>👶 For your 1-year-old</h4>
            <p>${esc(m.baby.note)}</p>
          </div>
        </section>` : ''}

        <div class="meal-edit-actions">
          <button class="btn-cancel" id="detail-edit">✎ Edit this meal</button>
          <button class="btn-delete" id="detail-delete">Delete</button>
        </div>
      </div>`;
    el.querySelector('#detail-edit').onclick = () => openMealEditor(m.id);
    el.querySelector('#detail-delete').onclick = () => {
      if (!confirm(`Delete "${m.name}"?`)) return;
      meals = meals.filter(x => x.id !== m.id);
      if (persist()) { renderMeals(); updateCounts(); closeModal(); }
    };
    openModalShell();
  }
  function openModalShell() {
    document.getElementById('modal-bg').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    document.body.style.overflow = '';
  }
  window.closeModal = closeModal;
  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target.id === 'modal-bg') closeModal();
  });

  /* =========================================================
     NAV + counts
     ========================================================= */
  function switchView(v) {
    currentView = v;
    document.getElementById('view-pantry').classList.toggle('active', v==='pantry');
    document.getElementById('view-meals').classList.toggle('active', v==='meals');
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('on', b.dataset.view===v));
    if (v==='meals') renderMeals();
  }
  function updateCounts() {
    const readyN = meals.filter(m => mealStatus(m).ready).length;
    const badge = document.getElementById('nav-meal-badge');
    badge.textContent = readyN;
    badge.style.display = readyN ? 'inline-block' : 'none';
    document.getElementById('pantry-count').textContent = `${have.size} on hand`;
    if (currentView === 'meals') renderMeals();
  }

  /* =========================================================
     EDITORS — add / edit / delete items & meals
     ========================================================= */
  function wireUploader(el, prefix, getEmoji) {
    const file = el.querySelector('#' + prefix + '-file');
    const preview = el.querySelector('#' + prefix + '-preview');
    file.onchange = () => {
      const f = file.files[0]; if (!f) return;
      fileToResizedDataURL(f, prefix === 'm' ? 640 : 480, url => {
        if (url) { pendingImg = url; preview.innerHTML = `<img src="${url}">`; }
        else alert('Sorry, that image could not be read.');
      });
    };
    el.querySelector('#' + prefix + '-imgurl').oninput = e => {
      const v = e.target.value.trim();
      if (v) { pendingImg = v; preview.innerHTML = `<img src="${esc(v)}" onerror="this.remove()">`; }
    };
    el.querySelector('#' + prefix + '-clearimg').onclick = () => {
      pendingImg = null;
      el.querySelector('#' + prefix + '-imgurl').value = '';
      preview.textContent = getEmoji() || (prefix === 'm' ? '🍽️' : '🛒');
    };
  }

  function openItemEditor(id) {
    const editing = id != null;
    const it = editing ? ITEM_BY_ID[id] : { name:'', aisle:'produce', emoji:'🥕', img:null, staple:false };
    pendingImg = it.img || null;
    const aisleOpts = AISLES.map(a => `<option value="${a.id}" ${a.id===it.aisle?'selected':''}>${a.emoji} ${a.name}</option>`).join('');
    const el = document.getElementById('modal');
    el.innerHTML = `
      <div class="editor">
        <h2>${editing ? 'Edit item' : 'Add grocery item'}</h2>
        <div class="form-field"><label>Name</label><input type="text" id="i-name" value="${esc(it.name)}" placeholder="e.g. Greek Yogurt"></div>
        <div class="form-row">
          <div class="form-field"><label>Aisle</label><select id="i-aisle">${aisleOpts}</select></div>
          <div class="form-field" style="flex:0 0 86px"><label>Emoji</label><input type="text" id="i-emoji" value="${esc(it.emoji||'')}" maxlength="4"></div>
        </div>
        <div class="form-field">
          <label>Photo (optional)</label>
          <div class="uploader">
            <div class="preview" id="i-preview">${pendingImg ? `<img src="${esc(pendingImg)}">` : (it.emoji||'🛒')}</div>
            <div class="up-actions">
              <label class="btn file-btn">📷 Upload photo<input type="file" accept="image/*" id="i-file" style="display:none"></label>
              <button class="btn ghost" id="i-clearimg" type="button">Use emoji instead</button>
            </div>
          </div>
          <input type="text" id="i-imgurl" placeholder="…or paste an image URL" style="margin-top:8px">
          <div class="hint">Uploaded photos are shrunk and saved on this device.</div>
        </div>
        <div class="form-field"><label class="check-line"><input type="checkbox" id="i-staple" ${it.staple?'checked':''}> Assume always on hand (staple — won’t block meal matches)</label></div>
        <div class="btn-row">
          <button class="btn-primary" id="i-save">${editing ? 'Save changes' : 'Add item'}</button>
          ${editing ? '<button class="btn-delete" id="i-delete">Delete</button>' : ''}
          <button class="btn-cancel" id="i-cancel">Cancel</button>
        </div>
      </div>`;
    openModalShell();
    wireUploader(el, 'i', () => el.querySelector('#i-emoji').value);
    el.querySelector('#i-cancel').onclick = closeModal;
    el.querySelector('#i-save').onclick = () => {
      const name = el.querySelector('#i-name').value.trim();
      if (!name) { el.querySelector('#i-name').focus(); return; }
      const obj = {
        id: editing ? id : uid(name),
        name,
        aisle: el.querySelector('#i-aisle').value,
        emoji: el.querySelector('#i-emoji').value.trim() || '🛒',
        staple: el.querySelector('#i-staple').checked,
      };
      if (pendingImg) obj.img = pendingImg;
      if (editing) { items[items.findIndex(x => x.id === id)] = obj; }
      else items.push(obj);
      if (!persist()) return;
      renderPantry(); updateCounts(); closeModal();
    };
    if (editing) el.querySelector('#i-delete').onclick = () => {
      if (!confirm(`Delete "${it.name}"? It will also be removed from any meals that use it.`)) return;
      items = items.filter(x => x.id !== id);
      meals.forEach(m => { if (m.ing) m.ing = m.ing.filter(x => x !== id); });
      have.delete(id); save();
      if (persist()) { renderPantry(); renderMeals(); updateCounts(); closeModal(); }
    };
  }

  function openMealEditor(id) {
    const editing = id != null;
    const m = editing ? meals.find(x => x.id === id)
                      : { name:'', type:'dinner', time:20, servings:2, emoji:'🍽️', img:null, ing:[], nutri:{kcal:0,protein:0,sodium:0,fiber:0}, veg:false, baby:{ok:false,note:''}, steps:[] };
    pendingImg = m.img || null;
    const typeOpts = ['breakfast','lunch','dinner','snack'].map(t => `<option ${t===m.type?'selected':''}>${t}</option>`).join('');
    const chosen = new Set(m.ing || []);
    const picker = AISLES.map(a => {
      const its = items.filter(i => i.aisle === a.id);
      if (!its.length) return '';
      return `<div class="grp">${a.emoji} ${a.name}</div>` +
        its.map(i => `<label class="ing-pick"><input type="checkbox" value="${i.id}" ${chosen.has(i.id)?'checked':''}> ${i.emoji||''} ${esc(i.name)}</label>`).join('');
    }).join('');
    const el = document.getElementById('modal');
    el.innerHTML = `
      <div class="editor">
        <h2>${editing ? 'Edit meal' : 'Add a meal'}</h2>
        <div class="form-field"><label>Meal name</label><input type="text" id="m-name" value="${esc(m.name)}" placeholder="e.g. Veggie Pasta Bake"></div>
        <div class="form-row">
          <div class="form-field"><label>Type</label><select id="m-type">${typeOpts}</select></div>
          <div class="form-field" style="flex:0 0 84px"><label>Emoji</label><input type="text" id="m-emoji" value="${esc(m.emoji||'')}" maxlength="4"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Time (min)</label><input type="number" id="m-time" value="${m.time||0}" min="0"></div>
          <div class="form-field"><label>Servings</label><input type="number" id="m-serv" value="${m.servings||1}" min="1"></div>
        </div>
        <div class="form-field">
          <label>Photo (optional)</label>
          <div class="uploader">
            <div class="preview" id="m-preview">${pendingImg ? `<img src="${esc(pendingImg)}">` : (m.emoji||'🍽️')}</div>
            <div class="up-actions">
              <label class="btn file-btn">📷 Upload photo<input type="file" accept="image/*" id="m-file" style="display:none"></label>
              <button class="btn ghost" id="m-clearimg" type="button">Use emoji instead</button>
            </div>
          </div>
          <input type="text" id="m-imgurl" placeholder="…or paste an image URL" style="margin-top:8px">
        </div>
        <div class="form-field">
          <label>Ingredients (from your pantry)</label>
          <div class="ing-picker" id="m-ings">${picker}</div>
          <div class="hint">Tick what this meal needs. If something’s missing, add it on the Pantry tab first.</div>
        </div>
        <div class="form-field"><label>Nutrition (per serving)</label>
          <div class="form-row">
            <div class="form-field"><label class="hint">Calories</label><input type="number" id="m-kcal" value="${m.nutri.kcal||0}" min="0"></div>
            <div class="form-field"><label class="hint">Protein (g)</label><input type="number" id="m-prot" value="${m.nutri.protein||0}" min="0"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label class="hint">Sodium (mg)</label><input type="number" id="m-sod" value="${m.nutri.sodium||0}" min="0"></div>
            <div class="form-field"><label class="hint">Fiber (g)</label><input type="number" id="m-fib" value="${m.nutri.fiber||0}" min="0"></div>
          </div>
        </div>
        <div class="form-field"><label class="check-line"><input type="checkbox" id="m-veg" ${m.veg?'checked':''}> 🌱 Vegetarian</label></div>
        <div class="form-field"><label class="check-line"><input type="checkbox" id="m-baby" ${m.baby&&m.baby.ok?'checked':''}> 👶 Baby-friendly (12 mo+)</label></div>
        <div class="form-field" id="m-babywrap" style="${m.baby&&m.baby.ok?'':'display:none'}">
          <label>Note for baby (safe prep / portioning)</label>
          <textarea id="m-babynote" placeholder="e.g. Mash soft, cut into finger strips, skip added salt…">${esc(m.baby?m.baby.note:'')}</textarea>
        </div>
        <div class="form-field"><label>Steps (one per line)</label><textarea id="m-steps" placeholder="Boil the pasta\nMake the sauce\nCombine and bake">${esc((m.steps||[]).join('\n'))}</textarea></div>
        <div class="btn-row">
          <button class="btn-primary" id="m-save">${editing ? 'Save changes' : 'Add meal'}</button>
          ${editing ? '<button class="btn-delete" id="m-delete">Delete</button>' : ''}
          <button class="btn-cancel" id="m-cancel">Cancel</button>
        </div>
      </div>`;
    openModalShell();
    wireUploader(el, 'm', () => el.querySelector('#m-emoji').value);
    el.querySelector('#m-baby').onchange = e => { el.querySelector('#m-babywrap').style.display = e.target.checked ? '' : 'none'; };
    el.querySelector('#m-cancel').onclick = closeModal;
    el.querySelector('#m-save').onclick = () => {
      const name = el.querySelector('#m-name').value.trim();
      if (!name) { el.querySelector('#m-name').focus(); return; }
      const babyOn = el.querySelector('#m-baby').checked;
      const obj = {
        id: editing ? id : uid(name),
        name,
        type: el.querySelector('#m-type').value,
        time: +el.querySelector('#m-time').value || 0,
        servings: +el.querySelector('#m-serv').value || 1,
        emoji: el.querySelector('#m-emoji').value.trim() || '🍽️',
        ing: [...el.querySelectorAll('#m-ings input:checked')].map(c => c.value),
        nutri: {
          kcal: +el.querySelector('#m-kcal').value || 0,
          protein: +el.querySelector('#m-prot').value || 0,
          sodium: +el.querySelector('#m-sod').value || 0,
          fiber: +el.querySelector('#m-fib').value || 0,
        },
        veg: el.querySelector('#m-veg').checked,
        baby: { ok: babyOn, note: babyOn ? el.querySelector('#m-babynote').value.trim() : '' },
        steps: el.querySelector('#m-steps').value.split('\n').map(s => s.trim()).filter(Boolean),
      };
      if (pendingImg) obj.img = pendingImg;
      if (editing) { meals[meals.findIndex(x => x.id === id)] = obj; }
      else meals.push(obj);
      if (!persist()) return;
      renderMeals(); updateCounts(); closeModal();
    };
    if (editing) el.querySelector('#m-delete').onclick = () => {
      if (!confirm(`Delete "${m.name}"?`)) return;
      meals = meals.filter(x => x.id !== id);
      if (persist()) { renderMeals(); updateCounts(); closeModal(); }
    };
  }

  /* =========================================================
     WIRE UP
     ========================================================= */
  document.querySelectorAll('nav.tabs button').forEach(b => b.onclick = () => switchView(b.dataset.view));
  document.getElementById('item-search').addEventListener('input', e => { itemFilter = e.target.value; renderPantry(); });
  document.getElementById('clear-pantry').onclick = () => {
    if (confirm('Uncheck every item in your pantry?')) { have.clear(); save(); renderPantry(); updateCounts(); }
  };
  const stToggle = document.getElementById('staples-toggle');
  stToggle.checked = assumeStaples;
  stToggle.onchange = () => { assumeStaples = stToggle.checked; save(); updateCounts(); };

  document.getElementById('add-item').onclick = () => openItemEditor(null);
  document.getElementById('add-meal').onclick = () => openMealEditor(null);
  document.getElementById('restore-defaults').onclick = () => {
    if (!confirm('Restore the original built-in items and meals?\n\nThis discards items and meals you’ve added or edited. Your pantry checkmarks are kept.')) return;
    items = clone(DEFAULT_ITEMS); meals = clone(DEFAULT_MEALS);
    if (persist()) { renderPantry(); renderMeals(); updateCounts(); }
  };

  renderGoals();
