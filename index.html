<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry → Plate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f4ec;
      --card: #ffffff;
      --ink: #2c2722;
      --muted: #8a8276;
      --line: #ece4d8;
      --accent: #4a9c63;        /* herb green */
      --accent-soft: #e7f2e8;
      --warn: #d98a3d;          /* warm amber */
      --baby: #c9648a;          /* berry */
      --baby-soft: #fbe9f0;
      --shadow: 0 10px 28px rgba(70,50,20,.10);
      --shadow-sm: 0 2px 10px rgba(70,50,20,.06);
      --radius: 20px;
      --radius-sm: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Nunito', system-ui, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 98px;
    }
    h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; font-weight: 600; }

    /* ---------- Header ---------- */
    header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(248,244,236,.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .head-inner {
      max-width: 920px; margin: 0 auto; padding: 14px 16px 10px;
    }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand h1 { margin: 0; font-size: 1.5rem; letter-spacing: -.01em; }
    .brand .sub { color: var(--muted); font-size: .85rem; font-weight: 600; }

    /* goals bar */
    .goals { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .goals::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto; cursor: pointer; user-select: none;
      border: 1.5px solid var(--line); background: var(--card);
      color: var(--muted); font-weight: 700; font-size: .85rem;
      padding: 8px 15px; border-radius: 999px; white-space: nowrap;
      transition: .15s ease;
    }
    .chip:hover { border-color: #d9cebd; }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.baby.on { background: var(--baby); border-color: var(--baby); }

    /* ---------- Layout ---------- */
    main { max-width: 920px; margin: 0 auto; padding: 18px 16px 40px; }
    .view { display: none; }
    .view.active { display: block; animation: fade .25s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .view-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 4px 0 14px; flex-wrap: wrap; }
    .view-head h2 { margin: 0; font-size: 1.55rem; letter-spacing: -.01em; }
    .count-pill { background: var(--accent-soft); color: var(--accent); font-weight: 800; font-size: .8rem; padding: 4px 11px; border-radius: 999px; }

    /* search + actions */
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search {
      flex: 1 1 200px; min-width: 0; display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1.5px solid var(--line); border-radius: 12px; padding: 9px 13px;
    }
    .search input { border: none; outline: none; background: transparent; font: inherit; width: 100%; color: var(--ink); }
    .btn {
      cursor: pointer; border: 1.5px solid var(--line); background: var(--card); color: var(--ink);
      font-family: inherit; font-weight: 800; font-size: .9rem; padding: 11px 16px; border-radius: var(--radius-sm); transition: .15s;
    }
    .btn:hover { border-color: #d9cebd; box-shadow: var(--shadow-sm); }
    .btn.ghost { color: var(--muted); font-weight: 700; }

    /* staples toggle */
    .staple-row { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: .8rem; font-weight: 700; margin: -6px 0 14px; }
    .switch { position: relative; width: 38px; height: 22px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #d9cebd; border-radius: 999px; transition: .2s; cursor: pointer; }
    .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    /* ---------- Aisle sections ---------- */
    .aisle { margin-bottom: 22px; }
    .aisle h3 { margin: 0 0 10px; font-size: 1.02rem; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    .aisle h3 .emoji { font-size: 1.1rem; }
    .aisle h3 small { font-family: 'Nunito'; font-weight: 700; color: var(--muted); font-size: .72rem; }

    /* item grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 10px; }
    .item {
      position: relative; cursor: pointer; background: var(--card); border: 1.5px solid var(--line);
      border-radius: var(--radius-sm); overflow: hidden; transition: .15s ease; text-align: center; box-shadow: var(--shadow-sm);
    }
    .item:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .item.have { border-color: var(--accent); }
    .item .thumb { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #f3ede3; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .item .thumb .fallback { font-size: 2.4rem; filter: drop-shadow(0 2px 3px rgba(80,60,30,.18)); }

    /* category gradient tiles (no external images — consistent + instant) */
    .g-produce { background: radial-gradient(120% 120% at 30% 20%, #eaf7e2 0%, #bfe5a8 100%); }
    .g-protein { background: radial-gradient(120% 120% at 30% 20%, #fce6db 0%, #f2b196 100%); }
    .g-dairy   { background: radial-gradient(120% 120% at 30% 20%, #fdf5d8 0%, #f6dd96 100%); }
    .g-grain   { background: radial-gradient(120% 120% at 30% 20%, #f6ebd6 0%, #e3caa0 100%); }
    .g-pantry  { background: radial-gradient(120% 120% at 30% 20%, #fdecd4 0%, #f3c587 100%); }
    .g-spice   { background: radial-gradient(120% 120% at 30% 20%, #efe9e0 0%, #cdbfa6 100%); }
    /* meal-type gradients (richer, for the bigger cards) */
    .t-breakfast { background: radial-gradient(130% 130% at 25% 15%, #ffeec0 0%, #ffb36b 100%); }
    .t-lunch     { background: radial-gradient(130% 130% at 25% 15%, #d6f0cf 0%, #7fc486 100%); }
    .t-dinner    { background: radial-gradient(130% 130% at 25% 15%, #f8cba1 0%, #e8825f 100%); }
    .t-snack     { background: radial-gradient(130% 130% at 25% 15%, #ecd6f2 0%, #c389d6 100%); }
    .item .name { font-size: .76rem; font-weight: 700; padding: 6px 4px 8px; color: var(--ink); }
    .item .tick {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.85); border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center;
      font-size: .8rem; color: transparent; transition: .15s;
    }
    .item.have .tick { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ---------- Meal cards ---------- */
    .meals { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .meal {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow-sm); display: flex; flex-direction: column; cursor: pointer; transition: .15s ease;
    }
    .meal:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .meal .photo { position: relative; width: 100%; aspect-ratio: 16 / 10; background: #f3ede3; overflow: hidden; }
    .meal .photo .fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3.6rem; filter: drop-shadow(0 3px 5px rgba(80,50,20,.22)); }
    .meal .ready-tag {
      position: absolute; top: 10px; left: 10px; font-size: .72rem; font-weight: 800; padding: 5px 10px; border-radius: 999px;
      background: rgba(255,255,255,.92); color: var(--ink); box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }
    .meal .ready-tag.ready { background: var(--accent); color: #fff; }
    .meal .ready-tag.close { background: var(--warn); color: #fff; }
    .meal .type-tag {
      position: absolute; top: 10px; right: 10px; font-size: .68rem; font-weight: 800; text-transform: capitalize;
      padding: 5px 9px; border-radius: 999px; background: rgba(47,42,37,.7); color: #fff; backdrop-filter: blur(2px);
    }
    .meal .body { padding: 13px 15px 16px; display: flex; flex-direction: column; gap: 9px; flex: 1; }
    .meal h3 { margin: 0; font-size: 1.12rem; line-height: 1.2; }
    .meal .meta { display: flex; gap: 12px; color: var(--muted); font-size: .78rem; font-weight: 700; }
    .nutri { display: flex; flex-wrap: wrap; gap: 6px; }
    .nutri .badge { font-size: .7rem; font-weight: 800; padding: 3px 8px; border-radius: 7px; background: #f3ede3; color: #6b6357; }
    .nutri .badge.good { background: var(--accent-soft); color: var(--accent); }
    .baby-flag { display: inline-flex; align-items: center; gap: 5px; font-size: .74rem; font-weight: 800; color: var(--baby); background: var(--baby-soft); padding: 4px 9px; border-radius: 8px; align-self: flex-start; }
    .ingline { font-size: .8rem; color: var(--muted); margin-top: auto; }
    .ingline .miss { color: var(--warn); font-weight: 800; }
    .ingline .allset { color: var(--accent); font-weight: 800; }

    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty .big { font-size: 3rem; margin-bottom: 8px; }
    .empty h3 { color: var(--ink); margin: 0 0 6px; }

    /* ---------- Modal ---------- */
    .modal-bg { position: fixed; inset: 0; background: rgba(40,32,22,.55); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--bg); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto;
      border-radius: 22px 22px 0 0; animation: slideup .28s ease;
    }
    @media (min-width: 600px) { .modal-bg { align-items: center; } .modal { border-radius: 22px; max-height: 88vh; } }
    @keyframes slideup { from { transform: translateY(40px); opacity: .6; } to { transform: none; opacity: 1; } }
    .modal .hero { position: relative; aspect-ratio: 16/9; background: #f3ede3; overflow: hidden; }
    .modal .hero .fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; filter: drop-shadow(0 4px 6px rgba(80,50,20,.22)); }
    .modal .close { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,.92); font-size: 1.2rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .modal .inner { padding: 18px 20px 30px; }
    .modal h2 { margin: 0 0 4px; font-size: 1.5rem; }
    .modal .sub { color: var(--muted); font-weight: 700; font-size: .85rem; margin-bottom: 14px; }
    .modal section { margin-top: 18px; }
    .modal section h4 { font-family: 'Fraunces'; margin: 0 0 9px; font-size: 1.05rem; }
    .ing-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 6px; }
    .ing-list li { display: flex; align-items: center; gap: 9px; font-size: .9rem; padding: 7px 11px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; }
    .ing-list li .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
    .ing-list li.have .dot { background: var(--accent); }
    .ing-list li.need .dot { background: var(--warn); }
    .ing-list li .tag-need { margin-left: auto; font-size: .7rem; font-weight: 800; color: var(--warn); }
    .ing-list li .tag-staple { margin-left: auto; font-size: .68rem; font-weight: 700; color: var(--muted); }
    .steps { padding-left: 20px; margin: 0; display: grid; gap: 8px; }
    .steps li { font-size: .9rem; }
    .baby-box { background: var(--baby-soft); border: 1px solid #f2cfdd; border-radius: 12px; padding: 13px 15px; }
    .baby-box h4 { color: var(--baby); }
    .baby-box p { margin: 0; font-size: .88rem; color: #7a4456; }
    .nutri-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .nutri-grid .n { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .nutri-grid .n b { display: block; font-size: 1.15rem; font-family: 'Fraunces'; }
    .nutri-grid .n span { font-size: .68rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }

    /* ---------- Bottom nav ---------- */
    nav.tabs {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: #ffffff; border-top: 1px solid #e4dccd;
      border-radius: 20px 20px 0 0; box-shadow: 0 -6px 26px rgba(70,50,20,.14);
      display: flex; justify-content: center; gap: 4px; padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
    }
    nav.tabs button {
      flex: 1; max-width: 130px; border: none; background: transparent; cursor: pointer; font-family: inherit;
      color: #6b6357; font-weight: 800; font-size: .74rem; padding: 8px 4px; border-radius: 14px; transition: .15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    nav.tabs button .ic { font-size: 1.5rem; }
    nav.tabs button.on { color: #fff; background: var(--accent); box-shadow: var(--shadow-sm); }
    nav.tabs button.on .ic { transform: translateY(-1px); }
    nav.tabs button.on .nav-badge { background: #fff; color: var(--accent); }
    nav.tabs button .nav-badge { font-size: .62rem; background: var(--accent); color: #fff; border-radius: 999px; padding: 0 6px; font-weight: 800; }
    /* custom photo layered over a gradient tile */
    .thumb .ph, .meal .photo .ph, .modal .hero .ph { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* edit pencil on item cards */
    .item .edit-badge { position: absolute; top: 6px; left: 6px; width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,.9); border: 1.5px solid var(--line); font-size: .72rem; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; color: #6b6357; z-index: 3; }
    .item .edit-badge:hover { background: #fff; border-color: var(--accent); color: var(--accent); }

    /* editor forms */
    .modal .editor { padding: 20px 20px 34px; }
    .modal .editor h2 { margin: 0 0 16px; font-size: 1.4rem; }
    .form-field { margin-bottom: 14px; }
    .form-field > label { display: block; font-weight: 800; font-size: .82rem; color: var(--ink); margin-bottom: 5px; }
    .form-field input[type=text], .form-field input[type=number], .form-field select, .form-field textarea {
      width: 100%; font: inherit; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--card); color: var(--ink); }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline: none; border-color: var(--accent); }
    .form-field textarea { min-height: 92px; resize: vertical; line-height: 1.5; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-field { flex: 1; }
    .form-row .form-field > label.hint { font-weight: 700; }
    .hint { font-size: .74rem; color: var(--muted); margin-top: 4px; font-weight: 600; }
    .check-line { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: .92rem; cursor: pointer; }
    .check-line input { width: 18px; height: 18px; }
    .uploader { display: flex; gap: 12px; align-items: center; }
    .uploader .preview { width: 74px; height: 74px; border-radius: 12px; flex: 0 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 1.5px solid var(--line); background: #f3ede3; }
    .uploader .preview img { width: 100%; height: 100%; object-fit: cover; }
    .uploader .up-actions { display: flex; flex-direction: column; gap: 6px; }
    .file-btn { cursor: pointer; margin: 0; }
    .ing-picker { max-height: 240px; overflow-y: auto; border: 1.5px solid var(--line); border-radius: 12px; padding: 6px; background: var(--card); }
    .ing-picker .grp { font-weight: 800; font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 8px 6px 3px; }
    .ing-pick { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; cursor: pointer; font-size: .88rem; }
    .ing-pick:hover { background: var(--accent-soft); }
    .ing-pick input { width: 17px; height: 17px; flex: 0 0 auto; }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 12px 16px; font-weight: 800; font-family: inherit; cursor: pointer; flex: 1; font-size: .92rem; }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-cancel { background: var(--card); color: var(--ink); border: 1.5px solid var(--line); border-radius: 12px; padding: 12px 16px; font-weight: 800; font-family: inherit; cursor: pointer; }
    .btn-delete { background: #fbe9e9; color: #c0392b; border: 1.5px solid #f0cccc; border-radius: 12px; padding: 12px 14px; font-weight: 800; font-family: inherit; cursor: pointer; }
    .meal-edit-actions { display: flex; gap: 10px; margin-top: 22px; border-top: 1px solid var(--line); padding-top: 18px; }
    .meal-edit-actions button { flex: 1; }

    /* meal (combo) cards + coverage + dish rows */
    .t-meal { background: radial-gradient(130% 130% at 25% 15%, #ffe9c7 0%, #f0a979 100%); }
    .meal .meta.dish-list { display: block; font-weight: 700; color: var(--muted); line-height: 1.35; }
    .view-note { color: var(--muted); font-size: .82rem; font-weight: 600; margin: -6px 0 14px; }
    .coverage { display: flex; flex-wrap: wrap; gap: 6px; }
    .cov { font-size: .74rem; font-weight: 800; padding: 4px 9px; border-radius: 8px; background: #f3ede3; color: #8a8276; }
    .cov.ok { background: var(--accent-soft); color: var(--accent); }
    .cov.gap { background: #fdecdd; color: var(--warn); }
    .dish-rows { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .dish-row { display: flex; align-items: center; gap: 11px; padding: 10px 12px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; cursor: pointer; }
    .dish-row:hover { border-color: #d9cebd; }
    .dish-row .d-emoji { font-size: 1.5rem; flex: 0 0 auto; }
    .dish-row .d-name { display: flex; flex-direction: column; font-weight: 800; font-size: .92rem; }
    .dish-row .d-name small { font-weight: 700; color: var(--muted); font-size: .74rem; }
    .dish-row .d-status { margin-left: auto; font-size: .74rem; font-weight: 800; color: var(--warn); white-space: nowrap; }
    .dish-row .d-status.ok { color: var(--accent); }

    /* inventory levels */
    .item.lvl-full { border-color: var(--accent); }
    .item.lvl-full .tick { background: var(--accent); border-color: var(--accent); color: #fff; }
    .item.lvl-low { border-color: var(--warn); }
    .item.lvl-low .tick { background: var(--warn); border-color: var(--warn); color: #fff; font-size: .82rem; font-weight: 800; }
    .item.lvl-out .tick { color: transparent; }
    .lvl-legend { display: flex; gap: 13px; justify-content: center; flex-wrap: wrap; color: var(--muted); font-size: .73rem; font-weight: 700; margin: -2px 0 16px; }
    .lvl-legend b { font-weight: 800; color: var(--ink); }
    .lvl-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }

    /* grocery list */
    .gro-aisle { font-weight: 800; font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 16px 4px 8px; }
    .gro-row { display: flex; align-items: center; gap: 11px; padding: 11px 13px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; }
    .gro-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--line); background: #fff; cursor: pointer; flex: 0 0 auto; font-size: .82rem; color: transparent; font-weight: 800; transition: .15s; }
    .gro-check:hover { border-color: var(--accent); color: var(--accent); }
    .gro-name { font-weight: 700; font-size: .95rem; flex: 1; }
    .gro-x { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 1rem; flex: 0 0 auto; padding: 4px; }
    .gro-x:hover { color: var(--warn); }

    /* cook sheet */
    .cook-rows { display: grid; gap: 12px; margin-bottom: 4px; }
    .cook-row { display: flex; align-items: center; gap: 10px; }
    .cook-name { flex: 1; font-weight: 700; font-size: .9rem; }
    .seg { display: flex; flex: 0 0 auto; border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden; }
    .seg button { border: none; background: var(--card); font-family: inherit; font-weight: 800; font-size: .74rem; padding: 7px 11px; cursor: pointer; color: var(--muted); border-left: 1.5px solid var(--line); }
    .seg button:first-child { border-left: none; }
    .seg button.on { background: var(--accent); color: #fff; }
    .seg button[data-lvl="low"].on { background: var(--warn); }
    .seg button[data-lvl="out"].on { background: #c0392b; }

    /* "I made this" button */
    .cook-btn { width: 100%; background: var(--accent-soft); color: var(--accent); border: 1.5px solid #cfe6cf; border-radius: 12px; padding: 13px; font-weight: 800; font-family: inherit; cursor: pointer; margin-top: 20px; font-size: .98rem; }
    .cook-btn:hover { filter: brightness(.98); }

    /* toast */

  /* =========================================================
     DATA — meals (saved combinations of dishes)
     dishIds reference dishes above; nutrition is summed live.
     ========================================================= */
  const DEFAULT_MEALS = [
    { id:'mealchickenplate', name:'Balanced Chicken Plate', emoji:'🍗', dishIds:['roastchicken','sidesalad','siderice'] },
    { id:'mealbabylunch', name:'Baby’s Favorite Lunch', emoji:'👶', dishIds:['avotoast','applesauce','sidepeas'] },
    { id:'mealtaconight', name:'Taco Night', emoji:'🌮', dishIds:['fishtacos','sidesalad'] },
  ];

  /* =========================================================
     STATE + persistence
     ========================================================= */
  const LS_STAPLES = 'p2p_staples_v1';
  const LS_INV = 'p2p_inv_v1';
  const LS_CATALOG = 'p2p_catalog_v2';
  const LS_CATALOG_V1 = 'p2p_catalog_v1';
  let assumeStaples = JSON.parse(localStorage.getItem(LS_STAPLES) ?? 'true');
  let activeGoals = new Set();
  let itemFilter = '';
  let currentView = 'ingredients';
  let pendingImg = null;

  // Editable catalog (v2): ingredients → dishes → meals (a meal = saved combo of dishes)
  let ingredients = [], dishes = [], meals = [], ING_BY_ID = {}, DISH_BY_ID = {};
  const clone = x => JSON.parse(JSON.stringify(x));
  function reindex() {
    ING_BY_ID = Object.fromEntries(ingredients.map(i => [i.id, i]));
    DISH_BY_ID = Object.fromEntries(dishes.map(d => [d.id, d]));
  }
  function seedCatalog() { ingredients = clone(DEFAULT_INGREDIENTS); dishes = clone(DEFAULT_DISHES); meals = clone(DEFAULT_MEALS); }
  function loadCatalog() {
    const v2 = localStorage.getItem(LS_CATALOG);
    if (v2) {
      try { const c = JSON.parse(v2); ingredients = c.ingredients || []; dishes = c.dishes || []; meals = c.meals || []; }
      catch (e) { seedCatalog(); }
    } else {
      const v1 = localStorage.getItem(LS_CATALOG_V1); // migrate older "items + meals" shape → ingredients + dishes
      if (v1) {
        try { const c = JSON.parse(v1); ingredients = c.items || clone(DEFAULT_INGREDIENTS); dishes = c.meals || clone(DEFAULT_DISHES); meals = clone(DEFAULT_MEALS); }
        catch (e) { seedCatalog(); }
      } else seedCatalog();
      reindex(); persist(); // write forward as v2
    }
    reindex();
  }
  function saveCatalog() { reindex(); localStorage.setItem(LS_CATALOG, JSON.stringify({ version: 2, ingredients, dishes, meals })); }
  function persist() {
    try { saveCatalog(); return true; }
    catch (e) { alert('Couldn’t save — you may have added too many large photos. Try smaller images, or paste an image URL instead.'); return false; }
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
  function uid(name, prefix) {
    const base = (prefix || '') + ((name || 'x').toLowerCase().replace(/[^a-z0-9]+/g, '').slice(0, 16) || 'x');
    const taken = id => ING_BY_ID[id] || DISH_BY_ID[id] || meals.some(m => m.id === id);
    let id = base, n = 1;
    while (taken(id)) id = base + (++n);
    return id;
  }
  // shrink an uploaded image to keep localStorage small, then hand back a data URL
  function fileToResizedDataURL(file, max, cb) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width >= height && width > max) { height = Math.round(height * max / width); width = max; }
        else if (height > width && height > max) { width = Math.round(width * max / height); height = max; }
        const c = document.createElement('canvas'); c.width = width; c.height = height;
        c.getContext('2d').drawImage(img, 0, 0, width, height);
        try { cb(c.toDataURL('image/jpeg', 0.82)); } catch (err) { cb(null); }
      };
      img.onerror = () => cb(null);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ---- inventory levels: 'full' | 'low' | 'out' (out = absent). Phase 1 toggles full/out. ----
  let inv = {};
  (function loadInv() {
    const raw = localStorage.getItem(LS_INV);
    if (raw) { try { inv = JSON.parse(raw) || {}; } catch (e) { inv = {}; } return; }
    const oldHave = localStorage.getItem('p2p_have_v1'); // migrate the old on-hand checkbox set
    if (oldHave) { try { JSON.parse(oldHave).forEach(id => inv[id] = 'full'); } catch (e) {} }
    localStorage.setItem(LS_INV, JSON.stringify(inv));
  })();
  function levelOf(id) { return inv[id] || 'out'; }
  function onHand(id) { return inv[id] === 'full' || inv[id] === 'low'; }
  function saveInv() { localStorage.setItem(LS_INV, JSON.stringify(inv)); }
  function setLevel(id, l) { if (l === 'out') delete inv[id]; else inv[id] = l; saveInv(); }
  function onHandCount() { return Object.keys(inv).filter(id => inv[id] && inv[id] !== 'out').length; }

  // ---- grocery list: ingredient ids you intend to buy ----
  const LS_GROCERY = 'p2p_grocery_v1';
  let grocery = new Set(JSON.parse(localStorage.getItem(LS_GROCERY) || '[]'));
  function saveGrocery() { localStorage.setItem(LS_GROCERY, JSON.stringify([...grocery])); }
  // tap-cycle a level: full → low → out → full. out adds to list; back to full clears it.
  function cycleLevel(id) {
    const cur = levelOf(id);
    const next = cur === 'full' ? 'low' : cur === 'low' ? 'out' : 'full';
    setLevel(id, next);
    if (next === 'out') grocery.add(id);
    else if (next === 'full') grocery.delete(id);
    saveGrocery();
    return next;
  }

  loadCatalog();

  const GOALS = [
    { id:'highprotein', label:'💪 High protein', test:m => m.nutri.protein >= 25 },
    { id:'lowcal',      label:'🔥 Low calorie',  test:m => m.nutri.kcal <= 380 },
    { id:'lowsodium',   label:'🧂 Low sodium',   test:m => m.nutri.sodium <= 400 },
    { id:'highfiber',   label:'🌾 High fiber',   test:m => m.nutri.fiber >= 6 },
    { id:'veg',         label:'🌱 Vegetarian',   test:m => !!m.veg },
    { id:'quick',       label:'⚡ Quick (≤20m)', test:m => m.time <= 20 },
    { id:'baby',        label:'👶 For baby',     test:m => m.baby && m.baby.ok, baby:true },
  ];

  function save() { localStorage.setItem(LS_STAPLES, JSON.stringify(assumeStaples)); }
  function aisleClass(aisleId) { return 'g-' + aisleId; }
  function typeClass(type) { return 't-' + type; }

  // Built-in images, baked into the code so they show on EVERY device (not just
  // the browser they were added in). Map an item/dish/meal id to an image URL —
  // either a repo-relative path like 'images/banana.jpg' (served by GitHub Pages)
  // or any public https URL. A per-item photo set in the app still overrides this.
  const DEFAULT_IMAGES = {
    // banana: 'images/banana.jpg',
    // roastchicken: 'https://…/chicken.jpg',
  };
  function imgFor(o) { return (o && o.img) || (o && DEFAULT_IMAGES[o.id]) || null; }

  // an ingredient counts as "on hand" if stocked, or if it's a staple and the toggle is on
  function hasItem(id) {
    if (onHand(id)) return true;
    const it = ING_BY_ID[id];
    return !!(assumeStaples && it && it.staple);
  }

  // status for a single dish, from its ingredient list
  function dishStatus(d) {
    const ing = (d.ing || []).filter(id => ING_BY_ID[id]); // ignore deleted ingredients
    const total = ing.length;
    const missing = ing.filter(id => !hasItem(id));
    return { total, haveCount: total - missing.length, missing, ratio: total ? (total - missing.length)/total : 0, ready: missing.length === 0 };
  }

  // a meal = combo of dishes. derive its dishes, combined nutrition, status, flags.
  function mealDishes(m) { return (m.dishIds || []).map(id => DISH_BY_ID[id]).filter(Boolean); }
  function combinedNutri(ds) {
    return ds.reduce((a, d) => ({
      kcal: a.kcal + (d.nutri.kcal||0), protein: a.protein + (d.nutri.protein||0),
      sodium: a.sodium + (d.nutri.sodium||0), fiber: a.fiber + (d.nutri.fiber||0),
    }), { kcal:0, protein:0, sodium:0, fiber:0 });
  }
  function mealStatus(m) {
    const ds = mealDishes(m);
    const ids = [...new Set(ds.flatMap(d => (d.ing||[]).filter(id => ING_BY_ID[id])))];
    const missing = ids.filter(id => !hasItem(id));
    return { total: ids.length, haveCount: ids.length - missing.length, missing, ratio: ids.length ? (ids.length-missing.length)/ids.length : 0, ready: missing.length === 0 };
  }
  function mealMeta(m) { // a dish-like object so the GOALS tests work on meals too
    const ds = mealDishes(m);
    return {
      nutri: combinedNutri(ds),
      veg: ds.length > 0 && ds.every(d => d.veg),
      baby: { ok: ds.length > 0 && ds.every(d => d.baby && d.baby.ok) },
      time: ds.reduce((a, d) => Math.max(a, d.time||0), 0),
    };
  }

  /* =========================================================
     RENDER — goals bar
     ========================================================= */
  function renderGoals() {
    const el = document.getElementById('goals');
    el.innerHTML = '';
    GOALS.forEach(g => {
      const c = document.createElement('div');
      c.className = 'chip' + (g.baby ? ' baby' : '') + (activeGoals.has(g.id) ? ' on' : '');
      c.textContent = g.label;
      c.onclick = () => {
        activeGoals.has(g.id) ? activeGoals.delete(g.id) : activeGoals.add(g.id);
        renderGoals(); renderActive();
      };
      el.appendChild(c);
    });
  }
  function renderActive() {
    if (currentView === 'dishes') renderDishes();
    else if (currentView === 'meals') renderMeals();
  }

  /* =========================================================
     RENDER — ingredients
     ========================================================= */
  function renderIngredients() {
    const wrap = document.getElementById('aisles');
    wrap.innerHTML = '';
    const q = itemFilter.trim().toLowerCase();

    AISLES.forEach(aisle => {
      const list = ingredients.filter(i => i.aisle === aisle.id && (!q || i.name.toLowerCase().includes(q)));
      if (!list.length) return;
      const sec = document.createElement('div');
      sec.className = 'aisle';
      const haveN = list.filter(i => onHand(i.id)).length;
      sec.innerHTML = `<h3><span class="emoji">${aisle.emoji}</span> ${aisle.name} <small>${haveN}/${list.length}</small></h3>`;
      const grid = document.createElement('div');
      grid.className = 'grid';
      list.forEach(i => grid.appendChild(ingredientCard(i)));
      sec.appendChild(grid);
      wrap.appendChild(sec);
    });

    if (!wrap.children.length) {
      wrap.innerHTML = `<div class="empty"><div class="big">🔍</div><h3>No matches</h3><p>Nothing matches “${esc(itemFilter)}”.</p></div>`;
    }
    document.getElementById('pantry-count').textContent = `${onHandCount()} on hand`;
  }

  const tickChar = l => l === 'full' ? '✓' : l === 'low' ? '½' : '';
  function ingredientCard(i) {
    const card = document.createElement('div');
    const lvl = levelOf(i.id);
    card.className = 'item lvl-' + lvl;
    const ph = imgFor(i) ? `<img class="ph" src="${esc(imgFor(i))}" alt="" onerror="this.style.display='none'">` : '';
    card.innerHTML = `
      <div class="thumb ${aisleClass(i.aisle)}">
        <span class="fallback">${i.emoji || '🛒'}</span>
        ${ph}
        <button class="edit-badge" title="Edit ingredient">✎</button>
        <div class="tick">${tickChar(lvl)}</div>
      </div>
      <div class="name">${esc(i.name)}</div>`;
    card.querySelector('.edit-badge').onclick = (e) => { e.stopPropagation(); openIngredientEditor(i.id); };
    card.onclick = () => {
      const nl = cycleLevel(i.id);
      card.className = 'item lvl-' + nl;
      card.querySelector('.tick').textContent = tickChar(nl);
      updateCounts();
    };
    return card;
  }

  /* =========================================================
     RENDER — dishes
     ========================================================= */
  function badges(nutri) {
    return [
      `<span class="badge ${nutri.protein>=25?'good':''}">${nutri.protein}g protein</span>`,
      `<span class="badge ${nutri.kcal<=380?'good':''}">${nutri.kcal} cal</span>`,
      `<span class="badge ${nutri.sodium<=400?'good':''}">${nutri.sodium}mg Na</span>`,
      `<span class="badge ${nutri.fiber>=6?'good':''}">${nutri.fiber}g fiber</span>`,
    ].join('');
  }
  function readyTag(s) {
    if (s.total === 0) return { tag:'No ingredients', cls:'' };
    if (s.ready) return { tag:'✓ Ready to cook', cls:'ready' };
    if (s.missing.length <= 2) return { tag:`Almost — need ${s.missing.length}`, cls:'close' };
    return { tag:`${s.haveCount}/${s.total} on hand`, cls:'' };
  }

  function renderDishes() {
    const wrap = document.getElementById('dishes-list');
    wrap.innerHTML = '';
    let list = dishes.slice();
    GOALS.forEach(g => { if (activeGoals.has(g.id)) list = list.filter(g.test); });
    list = list.map(d => ({ d, s: dishStatus(d) }))
               .sort((a,b) => (b.s.ratio - a.s.ratio) || (a.s.missing.length - b.s.missing.length) || (a.d.time - b.d.time));
    const readyN = list.filter(x => x.s.ready).length;
    document.getElementById('dishes-count').textContent =
      `${list.length} dish${list.length!==1?'es':''}${readyN ? ' · ' + readyN + ' ready' : ''}`;
    if (!list.length) {
      wrap.innerHTML = `<div class="empty"><div class="big">🍳</div><h3>No matches</h3><p>Turn off a filter or stock more ingredients.</p></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'meals';
    list.forEach(({d,s}) => grid.appendChild(dishCard(d,s)));
    wrap.appendChild(grid);
  }

  function dishCard(d, s) {
    const card = document.createElement('div');
    card.className = 'meal';
    const { tag, cls } = readyTag(s);
    let ingText;
    if (s.total === 0) ingText = `<span class="miss">No ingredients set — tap to edit</span>`;
    else if (s.ready) ingText = `<span class="allset">You have everything ✨</span>`;
    else ingText = `Just need <span class="miss">${s.missing.map(id => esc(ING_BY_ID[id].name)).join(', ')}</span>`;
    const ph = imgFor(d) ? `<img class="ph" src="${esc(imgFor(d))}" alt="" onerror="this.style.display='none'">` : '';
    card.innerHTML = `
      <div class="photo ${typeClass(d.type)}">
        <div class="fallback">${d.emoji || '🍽️'}</div>
        ${ph}
        <span class="ready-tag ${cls}">${tag}</span>
        <span class="type-tag">${esc(d.type)}</span>
      </div>
      <div class="body">
        <h3>${esc(d.name)}</h3>
        <div class="meta"><span>⏱ ${d.time} min</span><span>🍽 ${d.servings} servings</span></div>
        <div class="nutri">${badges(d.nutri)}</div>
        ${d.baby && d.baby.ok ? '<span class="baby-flag">👶 Baby-friendly (12 mo+)</span>' : ''}
        <div class="ingline">${ingText}</div>
      </div>`;
    card.onclick = () => openDishModal(d.id);
    return card;
  }

  /* =========================================================
     RENDER — meals (combos of dishes)
     ========================================================= */
  function renderMeals() {
    const wrap = document.getElementById('meals-list');
    wrap.innerHTML = '';
    let list = meals.map(m => ({ m, s: mealStatus(m), meta: mealMeta(m) }));
    GOALS.forEach(g => { if (activeGoals.has(g.id)) list = list.filter(x => g.test(x.meta)); });
    list.sort((a,b) => (b.s.ratio - a.s.ratio) || (a.s.missing.length - b.s.missing.length));
    const readyN = list.filter(x => x.s.ready).length;
    document.getElementById('meals-count').textContent =
      `${list.length} meal${list.length!==1?'s':''}${readyN ? ' · ' + readyN + ' ready' : ''}`;
    if (!meals.length) {
      wrap.innerHTML = `<div class="empty"><div class="big">🍽️</div><h3>No meals yet</h3><p>Combine dishes into a meal — tap “Build a meal”.</p></div>`;
      return;
    }
    if (!list.length) {
      wrap.innerHTML = `<div class="empty"><div class="big">🍽️</div><h3>No meals match those goals</h3><p>Try turning off a filter.</p></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'meals';
    list.forEach(({m,s,meta}) => grid.appendChild(mealCard(m,s,meta)));
    wrap.appendChild(grid);
  }

  function mealCard(m, s, meta) {
    const ds = mealDishes(m);
    const card = document.createElement('div');
    card.className = 'meal';
    const { tag, cls } = readyTag(s);
    const fallback = m.emoji || ds.map(d => d.emoji || '🍽️').slice(0,3).join('') || '🍽️';
    const ph = imgFor(m) ? `<img class="ph" src="${esc(imgFor(m))}" alt="" onerror="this.style.display='none'">` : '';
    const dishNames = ds.length ? ds.map(d => esc(d.name)).join(' · ') : 'No dishes yet — tap to edit';
    card.innerHTML = `
      <div class="photo t-meal">
        <div class="fallback" style="font-size:2.6rem">${fallback}</div>
        ${ph}
        <span class="ready-tag ${cls}">${tag}</span>
        <span class="type-tag">${ds.length} dish${ds.length!==1?'es':''}</span>
      </div>
      <div class="body">
        <h3>${esc(m.name)}</h3>
        <div class="meta dish-list">${dishNames}</div>
        <div class="nutri">${badges(meta.nutri)}</div>
        ${meta.baby.ok ? '<span class="baby-flag">👶 Baby-friendly (12 mo+)</span>' : ''}
        <div class="ingline">${s.ready ? '<span class="allset">You have everything ✨</span>' : (s.total===0 ? '' : `Just need <span class="miss">${s.missing.map(id=>esc(ING_BY_ID[id].name)).join(', ')}</span>`)}</div>
      </div>`;
    card.onclick = () => openMealModal(m.id);
    return card;
  }

  /* =========================================================
     DETAIL MODALS
     ========================================================= */
  function ingLI(id) {
    const it = ING_BY_ID[id];
    if (!it) return '';
    const got = hasItem(id);
    const staple = it.staple && !onHand(id) && assumeStaples;
    return `<li class="${got?'have':'need'}"><span class="dot"></span>${it.emoji || ''} ${esc(it.name)}
      ${got ? (staple ? '<span class="tag-staple">staple</span>' : '') : '<span class="tag-need">need</span>'}</li>`;
  }

  function openDishModal(id) {
    const d = DISH_BY_ID[id]; if (!d) return;
    const s = dishStatus(d);

  async function doImport(el) {
    const url = el.querySelector('#imp-url').value.trim();
    const status = el.querySelector('#imp-status');
    el.querySelector('#imp-review').innerHTML = '';
    if (!/^https?:\/\//i.test(url)) { status.innerHTML = `<p class="imp-err">Please paste a full link starting with http.</p>`; return; }
    status.innerHTML = `<p class="imp-loading">⏳ Fetching recipe…</p>`;
    try {
      const recipe = await fetchRecipe(url);
      if (!recipe || !recipe.name) throw new Error('no-recipe');
      status.innerHTML = `<p class="imp-ok">✓ Found a recipe</p>`;
      showImportReview(el, recipe);
    } catch (e) {
      status.innerHTML = `<p class="imp-err">Couldn’t read a recipe from that page. Some sites block importing — try a different recipe, or add the dish manually.</p>`;
    }
  }

  async function fetchRecipe(url) {
    const proxies = [
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    ];
    let html = null;
    for (const make of proxies) {
      try {
        const res = await fetch(make(url));
        if (res.ok) { const t = await res.text(); if (t && t.length > 200) { html = t; break; } }
      } catch (e) { /* try next proxy */ }
    }
    if (!html) throw new Error('fetch-failed');
    const doc = new DOMParser().parseFromString(html, 'text/html');
    for (const s of doc.querySelectorAll('script[type="application/ld+json"]')) {
      let data; try { data = JSON.parse(s.textContent); } catch (e) { continue; }
      const node = findRecipe(data);
      if (node) return normalizeRecipe(node);
    }
    return null;
  }

  function findRecipe(data) {
    if (!data) return null;
    if (Array.isArray(data)) { for (const x of data) { const r = findRecipe(x); if (r) return r; } return null; }
    const t = data['@type'];
    const isRecipe = t && (Array.isArray(t) ? t.includes('Recipe') : t === 'Recipe');
    if (isRecipe) return data;
    if (data['@graph']) return findRecipe(data['@graph']);
    return null;
  }

  const pickImage = img => !img ? null : typeof img === 'string' ? img : Array.isArray(img) ? pickImage(img[0]) : (img.url || null);
  const parseDuration = d => { if (!d || typeof d !== 'string') return 0; const m = d.match(/PT(?:(\d+)H)?(?:(\d+)M)?/); return m ? (+(m[1]||0))*60 + (+(m[2]||0)) : 0; };
  const parseYield = y => { if (y == null) return 0; if (Array.isArray(y)) y = y[0]; const m = String(y).match(/\d+/); return m ? +m[0] : 0; };
  const parseNum = s => { if (s == null) return 0; const m = String(s).match(/[\d.]+/); return m ? Math.round(+m[0]) : 0; };
  function flattenInstructions(ins) {
    if (!ins) return [];
    if (typeof ins === 'string') return ins.split(/\r?\n+/).map(s => s.trim()).filter(Boolean);
    if (!Array.isArray(ins)) return [];
    const out = [];
    ins.forEach(step => {
      if (typeof step === 'string') out.push(step.trim());
      else if (step.text) out.push(String(step.text).trim());
      else if (step['@type'] === 'HowToSection' && Array.isArray(step.itemListElement))
        step.itemListElement.forEach(s => { if (s.text) out.push(String(s.text).trim()); });
    });
    return out.filter(Boolean);
  }
  function normalizeRecipe(r) {
    const n = r.nutrition || {};
    return {
      name: (r.name || '').toString().trim(),
      img: pickImage(r.image),
      time: parseDuration(r.totalTime) || parseDuration(r.cookTime) || 0,
      servings: parseYield(r.recipeYield) || 1,
      steps: flattenInstructions(r.recipeInstructions),
      ingLines: Array.isArray(r.recipeIngredient) ? r.recipeIngredient.map(x => String(x).trim()).filter(Boolean) : [],
      nutri: { kcal: parseNum(n.calories), protein: parseNum(n.proteinContent), sodium: parseNum(n.sodiumContent), fiber: parseNum(n.fiberContent) },
    };
  }

  function matchIngredient(line) {
    const l = ' ' + line.toLowerCase() + ' ';
    let best = null;
    ingredients.forEach(i => {
      const n = i.name.toLowerCase();
      const forms = [n, n.replace(/s$/, '')].filter(f => f.length > 2);
      forms.forEach(f => {
        if (l.includes(' ' + f) || l.includes(f + ' ') || l.includes(f)) {
          if (!best || f.length > best._len) { best = i; best._len = f.length; }
        }
      });
    });
    return best;
  }
  function cleanIngredientName(line) {
    let s = ' ' + line.toLowerCase() + ' ';
    s = s.replace(/\([^)]*\)/g, ' ').replace(/[\d¼½¾⅓⅔⅛⅜⅝⅞.,/-]+/g, ' ');
    s = s.replace(/\b(cups?|tbsps?|tablespoons?|tsps?|teaspoons?|oz|ounces?|lbs?|pounds?|grams?|g|kg|ml|l|cloves?|cans?|jars?|packages?|pkg|slices?|sticks?|pinch|dash|handful|to taste|chopped|minced|diced|sliced|grated|shredded|fresh|large|small|medium|ground|boneless|skinless|optional|finely|roughly)\b/g, ' ');
    s = s.replace(/\s+/g, ' ').trim();
    const w = s.split(' ').filter(Boolean).slice(-3).join(' ');
    return w ? w.replace(/\b\w/g, c => c.toUpperCase()) : line.trim();
  }

  function showImportReview(el, recipe) {
    const review = el.querySelector('#imp-review');
    const rows = recipe.ingLines.map((line, idx) => {
      const m = matchIngredient(line);
      if (m) return `<div class="imp-ing matched" data-match="${m.id}"><span class="imp-dot"></span><span class="imp-line">${esc(line)}</span><span class="imp-tag">${m.emoji||''} ${esc(m.name)}</span></div>`;
      return `<div class="imp-ing new"><label class="imp-line2"><input type="checkbox" class="imp-create" checked> <span class="imp-line">${esc(line)}</span></label><input type="text" class="imp-newname" value="${esc(cleanIngredientName(line))}"></div>`;
    }).join('');
    review.innerHTML = `
      <div class="imp-summary">
        <b>${esc(recipe.name)}</b>
        <div class="hint">⏱ ${recipe.time||'?'} min · 🍽 ${recipe.servings||'?'} servings · ${recipe.steps.length} steps · ${recipe.nutri.kcal||'?'} cal</div>
      </div>
      <div class="form-field"><label>Ingredients (${recipe.ingLines.length})</label>
        <div class="imp-ings">${rows || '<p class="hint">No ingredients found in the page data.</p>'}</div>
        <div class="hint">Green = matched to your pantry. Unmatched ones become new ingredients (uncheck to skip, or rename).</div>
      </div>
      <div class="btn-row"><button class="btn-primary" id="imp-open">Review &amp; add dish →</button></div>`;
    review.querySelector('#imp-open').onclick = () => {
      const ingIds = [];
      review.querySelectorAll('.imp-ing').forEach(row => {

            ingIds.push(it.id);

      openDishEditor(null, {

        img: recipe.img || null, ing: [...new Set(ingIds)], steps: recipe.steps,
        nutri: recipe.nutri, type: 'dinner',
      });
    };
  }

  /* =========================================================
     BACKUP / RESTORE — export & import all data as a file
     ========================================================= */
  function exportObject() {
    return {
      app: 'pantry-to-plate', schema: 2, exportedAt: new Date().toISOString(),
      catalog: { ingredients, dishes, meals },
      inventory: inv, grocery: [...grocery], settings: { assumeStaples },
    };
  }
  function downloadBackup() {
    const blob = new Blob([JSON.stringify(exportObject(), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `pantry-plate-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    toast('Backup downloaded ⬇️');
  }
  function applyImport(data, mode) {
    const cat = (data && data.catalog) ? data.catalog : data;
    if (!cat || !Array.isArray(cat.ingredients) || !Array.isArray(cat.dishes)) throw new Error('bad-backup');
    if (mode === 'replace') {
      ingredients = cat.ingredients; dishes = cat.dishes; meals = Array.isArray(cat.meals) ? cat.meals : [];
      inv = (data.inventory && typeof data.inventory === 'object') ? data.inventory : {};
      grocery = new Set(Array.isArray(data.grocery) ? data.grocery : []);
      if (data.settings && typeof data.settings.assumeStaples === 'boolean') assumeStaples = data.settings.assumeStaples;
    } else { // merge: add anything new, keep what's here
      const has = (arr, id) => arr.some(x => x.id === id);
      cat.ingredients.forEach(i => { if (!has(ingredients, i.id)) ingredients.push(i); });
      cat.dishes.forEach(d => { if (!has(dishes, d.id)) dishes.push(d); });
      (cat.meals || []).forEach(m => { if (!has(meals, m.id)) meals.push(m); });
      if (data.inventory) Object.assign(inv, data.inventory);
      (data.grocery || []).forEach(id => grocery.add(id));
    }
    reindex();
    if (!persist()) return false;
    saveInv(); saveGrocery(); save();
    return true;
  }
  function renderAll() {
    document.getElementById('staples-toggle').checked = assumeStaples;
    renderHome(); renderIngredients(); renderDishes(); renderMeals(); renderGrocery(); updateCounts();
  }

  // pull in any built-in ingredients/dishes/meals you don't have yet, without
  // touching your own edits — used when the built-in library grows.
  function addNewBuiltins() {
    const has = (arr, id) => arr.some(x => x.id === id);
    let n = 0;
    DEFAULT_INGREDIENTS.forEach(i => { if (!has(ingredients, i.id)) { ingredients.push(clone(i)); n++; } });
    DEFAULT_DISHES.forEach(d => { if (!has(dishes, d.id)) { dishes.push(clone(d)); n++; } });
    DEFAULT_MEALS.forEach(m => { if (!has(meals, m.id)) { meals.push(clone(m)); n++; } });
    if (n) { reindex(); if (!persist()) return; renderAll(); }
    toast(n ? `Added ${n} new built-in item${n!==1?'s':''} ✨` : 'Already up to date 👍');
  }

  function openDataModal() {
    const el = document.getElementById('modal');
    el.innerHTML = `

        <h2>💾 Backup &amp; restore</h2>

        </div>

          <label>Restore from a backup</label>

          <div class="btn-row">

            <button class="btn" id="data-merge">Merge</button>
          </div>
        </div>
        <div class="btn-row"><button class="btn-cancel" id="data-close">Close</button></div>
      </div>`;
    openModalShell();
    el.querySelector('#data-close').onclick = closeModal;
    el.querySelector('#data-copy').onclick = () => {
      const txt = el.querySelector('#data-out').value;
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(() => toast('Copied 📋'), () => toast('Copy failed — select & copy manually'));
      else { el.querySelector('#data-out').select(); toast('Select all & copy'); }
    };
    el.querySelector('#data-download').onclick = downloadBackup;
    const inBox = el.querySelector('#data-in');
    el.querySelector('#data-file').onchange = (e) => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => { inBox.value = ev.target.result; toast('File loaded — choose Replace or Merge'); };
      r.readAsText(f);
    };
    const run = (mode) => {
      const txt = inBox.value.trim();
      if (!txt) { toast('Choose a file or paste a backup first'); return; }
      let data; try { data = JSON.parse(txt); } catch (e) { alert('That doesn’t look like valid backup text.'); return; }
      if (mode === 'replace' && !confirm('Replace ALL your current data with this backup? (Export first if unsure.)')) return;
      try {
        if (applyImport(data, mode)) { closeModal(); renderAll(); switchView('home'); toast(mode === 'replace' ? 'Restored ✓' : 'Merged ✓'); }
      } catch (e) { alert('Couldn’t read that backup — it may be from a different app or corrupted.'); }
    };
    el.querySelector('#data-replace').onclick = () => run('replace');
    el.querySelector('#data-merge').onclick = () => run('merge');
  }

     QUICK ADD — bulk / voice entry into the pantry
     ========================================================= */
  let qaRecog = null, qaListening = false;
  function stopDictation() { if (qaRecog) { try { qaRecog.stop(); } catch (e) {} qaRecog = null; } qaListening = false; }
  function toggleDictation(btn, ta) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { toast('Use your keyboard’s 🎤 mic to dictate'); return; }
    if (qaListening) { stopDictation(); btn.classList.remove('on'); btn.textContent = '🎤 Dictate'; return; }
    qaRecog = new SR(); qaRecog.lang = 'en-US'; qaRecog.continuous = true; qaRecog.interimResults = false;
    qaRecog.onresult = e => {
      let s = '';
      for (let i = e.resultIndex; i < e.results.length; i++) if (e.results[i].isFinal) s += e.results[i][0].transcript.trim() + '\n';
      if (s) { const cur = ta.value.trim(); ta.value = (cur ? cur + '\n' : '') + s; }
    };
    qaRecog.onend = () => { qaListening = false; btn.classList.remove('on'); btn.textContent = '🎤 Dictate'; };
    qaRecog.onerror = () => { qaListening = false; btn.classList.remove('on'); btn.textContent = '🎤 Dictate'; };
    try { qaRecog.start(); qaListening = true; btn.classList.add('on'); btn.textContent = '⏹ Stop'; }
    catch (e) { toast('Couldn’t start the mic'); }
  }

  const titleCase = s => s.replace(/\b\w/g, c => c.toUpperCase());
  function parseBulk(text) {
    return [...new Set(text.split(/[,\n;]+/).map(s => s.replace(/^[\s\-*•\d.)]+/, '').trim().toLowerCase()).filter(s => s.length >= 2))];
  }
  function bulkMatch(token) {
    const t = token.toLowerCase();
    let best = null, bs = 0;
    ingredients.forEach(i => {
      const n = i.name.toLowerCase(); let s = 0;
      if (n === t) s = 100;
      else if ((' ' + t + ' ').includes(' ' + n + ' ')) s = n.length + 5;
      else if (t.includes(n)) s = n.length;
      else if (n.includes(t) && t.length >= 3) s = t.length;
      if (s > bs) { bs = s; best = i; }
    });
    return bs ? best : null;
  }

    el.innerHTML = `

  function showQuickReview(el, tokens) {
    const review = el.querySelector('#qa-review');
    const rows = tokens.map(tok => {
      const m = bulkMatch(tok);
      if (m) return `<div class="imp-ing matched" data-match="${m.id}"><span class="imp-dot"></span><span class="imp-line">${esc(tok)}</span><span class="imp-tag">${m.emoji||''} ${esc(m.name)}</span></div>`;
      return `<div class="imp-ing new"><label class="imp-line2"><input type="checkbox" class="imp-create" checked> <span class="imp-line">${esc(tok)}</span></label>
        <div class="qa-newrow"><input type="text" class="imp-newname" value="${esc(titleCase(tok))}"><select class="qa-aisle">${AISLES.map(a => `<option value="${a.id}"${a.id==='pantry'?' selected':''}>${a.emoji} ${a.name}</option>`).join('')}</select></div></div>`;
    }).join('');
    review.innerHTML = `
      <div class="form-field" style="margin-top:14px">
        <label>Review (${tokens.length}) — all will be marked <b>Full</b></label>
        <div class="imp-ings">${rows}</div>

      </div>

    review.querySelector('#qa-add').onclick = () => {
      let n = 0;
      review.querySelectorAll('.imp-ing').forEach(row => {
        if (row.classList.contains('matched')) { setLevel(row.dataset.match, 'full'); grocery.delete(row.dataset.match); n++; return; }
        const cb = row.querySelector('.imp-create');
        if (cb && cb.checked) {
          const nm = row.querySelector('.imp-newname').value.trim();
          if (nm) {
            let it = ingredients.find(i => i.name.toLowerCase() === nm.toLowerCase());
            if (!it) { it = { id: uid(nm), name: nm, aisle: row.querySelector('.qa-aisle').value || 'pantry', emoji: '🛒' }; ingredients.push(it); }
            setLevel(it.id, 'full'); grocery.delete(it.id); n++;
          }
        }
      });
      saveGrocery();
      if (!persist()) return;
      stopDictation(); closeModal();
      renderIngredients(); updateCounts();
      toast(`Added ${n} item${n!==1?'s':''} to pantry ✓`);
    };
  }

  ];
  let tourIdx = 0;
  function startTour() {
    tourIdx = 0;
    document.getElementById('tour-skip').onclick = endTour;
    document.getElementById('tour-back').onclick = () => { if (tourIdx > 0) { tourIdx--; runTourStep(); } };
    document.getElementById('tour-next').onclick = () => { if (tourIdx < TOUR.length - 1) { tourIdx++; runTourStep(); } else endTour(); };
    window.addEventListener('resize', tourReposition);
    runTourStep();
  }
  function tourReposition() { if (document.getElementById('tour').style.display === 'block') positionTour(TOUR[tourIdx]); }
  function runTourStep() {
    const step = TOUR[tourIdx];
    const apply = () => {
      document.getElementById('tour-step').textContent = `Step ${tourIdx+1} of ${TOUR.length}`;
      document.getElementById('tour-title').textContent = step.title;
      document.getElementById('tour-text').textContent = step.text;
      document.getElementById('tour-back').style.visibility = tourIdx === 0 ? 'hidden' : 'visible';
      document.getElementById('tour-next').textContent = tourIdx === TOUR.length - 1 ? 'Done' : 'Next';
      document.getElementById('tour').style.display = 'block';
      positionTour(step);
    };
    if (step.view && currentView !== step.view) { switchView(step.view); setTimeout(apply, 90); }
    else apply();
  }
  function positionTour(step) {
    const target = step.sel ? document.querySelector(step.sel) : null;
    if (target) target.scrollIntoView({ block: 'center' });
    requestAnimationFrame(() => {
      const spot = document.getElementById('tour-spot'), card = document.getElementById('tour-card');
      if (target) {
        const r = target.getBoundingClientRect(), pad = 8, cardH = 184;
        spot.style.top = (r.top - pad) + 'px'; spot.style.left = (r.left - pad) + 'px';
        spot.style.width = (r.width + pad*2) + 'px'; spot.style.height = (r.height + pad*2) + 'px';
        if (window.innerHeight - r.bottom > cardH + 24) { card.style.top = (r.bottom + 12) + 'px'; card.style.bottom = 'auto'; card.style.transform = 'translateX(-50%)'; }
        else if (r.top > cardH + 24) { card.style.top = (r.top - cardH - 12) + 'px'; card.style.bottom = 'auto'; card.style.transform = 'translateX(-50%)'; }
        else { card.style.top = 'auto'; card.style.bottom = '92px'; card.style.transform = 'translateX(-50%)'; }
      } else {
        spot.style.width = '0px'; spot.style.height = '0px'; spot.style.top = '50%'; spot.style.left = '50%';
        card.style.top = '50%'; card.style.bottom = 'auto'; card.style.transform = 'translate(-50%,-50%)';
      }
    });
  }
  function endTour() {
    document.getElementById('tour').style.display = 'none';
    window.removeEventListener('resize', tourReposition);
  }

  /* =========================================================
     RENDER — home / landing
     ========================================================= */
  function greeting() { const h = new Date().getHours(); return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'; }
  function daySeed() { const d = new Date(); return d.getFullYear()*372 + (d.getMonth()+1)*31 + d.getDate(); }
  function readyList() {
    return [
      ...meals.filter(m => mealDishes(m).length && mealStatus(m).ready).map(m => ({ kind:'meal', item:m })),
      ...dishes.filter(d => (d.ing||[]).length && dishStatus(d).ready).map(d => ({ kind:'dish', item:d })),
    ];
  }
  function pickOfDay() {
    const ready = readyList();
    let pool = ready.length ? ready
      : meals.filter(m => mealDishes(m).length).map(m => ({ kind:'meal', item:m }));
    if (!pool.length) pool = dishes.map(d => ({ kind:'dish', item:d }));
    return pool.length ? pool[daySeed() % pool.length] : null;
  }
  function randomPick() {
    const all = [...meals.filter(m => mealDishes(m).length).map(m => ({ kind:'meal', item:m })), ...dishes.map(d => ({ kind:'dish', item:d }))];
    return all.length ? all[Math.floor(Math.random() * all.length)] : null;
  }
  function openPick(p) { if (!p) return; (p.kind === 'meal' ? openMealModal : openDishModal)(p.item.id); }

  function pickVisual(p) { // → { grad, fallback, nutri, status, eyebrow }
    const it = p.item, isMeal = p.kind === 'meal';
    const ds = isMeal ? mealDishes(it) : null;
    return {
      grad: isMeal ? 't-meal' : typeClass(it.type),
      fallback: it.emoji || (isMeal ? ds.map(d => d.emoji || '🍽️').slice(0,3).join('') : '🍽️') || '🍽️',
      nutri: isMeal ? mealMeta(it).nutri : it.nutri,
      status: isMeal ? mealStatus(it) : dishStatus(it),
      eyebrow: isMeal ? '🍽️ Meal of the day' : '🍳 Dish of the day',
    };
  }

    body.innerHTML = `
      <div class="home-greet"><h1>${greeting()} 👋</h1><p>${dateStr}</p></div>
