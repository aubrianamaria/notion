    el.innerHTML = `
      <div class="editor">
        <h2>🍳 Made “${esc(title)}”</h2>
        <p class="view-note">How much of each is left? Anything marked <b>Out</b> goes on your grocery list.</p>
        <div class="cook-rows">${rows}</div>
        <div class="btn-row">
          <button class="btn-primary" id="cook-save">Update inventory</button>
          <button class="btn-cancel" id="cook-cancel">Cancel</button>
        </div>
      </div>`;
    openModalShell();
    el.querySelectorAll('.seg').forEach(seg => seg.querySelectorAll('button').forEach(b => b.onclick = () => {
      seg.querySelectorAll('button').forEach(x => x.classList.remove('on')); b.classList.add('on');
    }));
    el.querySelector('#cook-cancel').onclick = closeModal;
    el.querySelector('#cook-save').onclick = () => {
      el.querySelectorAll('.cook-row').forEach(r => {
        const id = r.dataset.id, sel = r.querySelector('.seg button.on');
        const lvl = sel ? sel.dataset.lvl : 'full';
        setLevel(id, lvl);
        if (lvl === 'out') grocery.add(id); else if (lvl === 'full') grocery.delete(id);
      });
      saveGrocery(); closeModal();
      renderIngredients(); renderDishes(); renderMeals(); renderGrocery(); updateCounts();
      toast('Inventory updated 🧺');
    };
  }

  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  /* =========================================================
     NAV + counts
     ========================================================= */
  function switchView(v) {
    currentView = v;
    ['home','ingredients','dishes','meals','grocery'].forEach(name =>
      document.getElementById('view-' + name).classList.toggle('active', v === name));
    document.getElementById('goals').style.display = (v === 'dishes' || v === 'meals') ? 'flex' : 'none';
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('on', b.dataset.view===v));
    window.scrollTo(0, 0);
    if (v==='home') renderHome();
    if (v==='dishes') renderDishes();
    if (v==='meals') renderMeals();
    if (v==='grocery') renderGrocery();
    showTipFor(v);
  }
  function setBadge(id, n) {
    const b = document.getElementById(id);
    b.textContent = n; b.style.display = n ? 'inline-block' : 'none';
  }
  function updateCounts() {
    setBadge('nav-dish-badge', dishes.filter(d => dishStatus(d).ready).length);
    setBadge('nav-meal-badge', meals.filter(m => mealStatus(m).ready).length);
    setBadge('nav-grocery-badge', [...grocery].filter(id => ING_BY_ID[id]).length);
    document.getElementById('pantry-count').textContent = `${onHandCount()} on hand`;
    if (currentView === 'home') renderHome();
    if (currentView === 'dishes') renderDishes();
    if (currentView === 'meals') renderMeals();
    if (currentView === 'grocery') renderGrocery();
  }

  /* =========================================================
     EDITORS — ingredients, dishes, meal builder
     ========================================================= */
  function wireUploader(el, p, getEmoji, defEmoji, maxSize) {
    const file = el.querySelector('#'+p+'-file'), preview = el.querySelector('#'+p+'-preview');
    file.onchange = () => {
      const f = file.files[0]; if (!f) return;
      fileToResizedDataURL(f, maxSize, url => {
        if (url) { pendingImg = url; preview.innerHTML = `<img src="${url}">`; }
        else alert('Sorry, that image could not be read.');
      });
    };
    el.querySelector('#'+p+'-imgurl').oninput = e => {
      const v = e.target.value.trim();
      if (v) { pendingImg = v; preview.innerHTML = `<img src="${esc(v)}" onerror="this.remove()">`; }
    };
    el.querySelector('#'+p+'-clearimg').onclick = () => {
      pendingImg = null; el.querySelector('#'+p+'-imgurl').value = ''; preview.textContent = getEmoji() || defEmoji;
    };
  }

  function openIngredientEditor(id) {
    const editing = id != null;
    const it = editing ? ING_BY_ID[id] : { name:'', aisle:'produce', emoji:'🥕', img:null, staple:false };
    pendingImg = imgFor(it) || null;
    const aisleOpts = AISLES.map(a => `<option value="${a.id}" ${a.id===it.aisle?'selected':''}>${a.emoji} ${a.name}</option>`).join('');
    const el = document.getElementById('modal');
    el.innerHTML = `
      <div class="editor">
        <h2>${editing ? 'Edit ingredient' : 'Add ingredient'}</h2>
        <div class="form-field"><label>Name</label><input type="text" id="i-name" value="${esc(it.name)}" placeholder="e.g. Greek Yogurt"></div>
        <div class="form-row">
          <div class="form-field"><label>Aisle</label><select id="i-aisle">${aisleOpts}</select></div>
          <div class="form-field" style="flex:0 0 86px"><label>Emoji</label><input type="text" id="i-emoji" value="${esc(it.emoji||'')}" maxlength="4"></div>
        </div>
        <div class="form-field">
          <label>Photo (optional)</label>
          <div class="uploader">
            <div class="preview" id="i-preview">${pendingImg ? `<img src="${esc(pendingImg)}">` : (it.emoji||'🛒')}</div>
            <div class="up-actions">
              <label class="btn file-btn">📷 Upload photo<input type="file" accept="image/*" id="i-file" style="display:none"></label>
              <button class="btn ghost" id="i-clearimg" type="button">Use emoji instead</button>
            </div>
          </div>
          <input type="text" id="i-imgurl" placeholder="…or paste an image URL" style="margin-top:8px">
          <div class="hint">Uploaded photos are shrunk and saved on this device.</div>
        </div>
        <div class="form-field"><label class="check-line"><input type="checkbox" id="i-staple" ${it.staple?'checked':''}> Assume always on hand (staple — won’t block matches)</label></div>
        <div class="btn-row">
          <button class="btn-primary" id="i-save">${editing ? 'Save changes' : 'Add ingredient'}</button>
          ${editing ? '<button class="btn-delete" id="i-delete">Delete</button>' : ''}
          <button class="btn-cancel" id="i-cancel">Cancel</button>
        </div>
      </div>`;
    openModalShell();
    wireUploader(el, 'i', () => el.querySelector('#i-emoji').value, '🛒', 480);
    el.querySelector('#i-cancel').onclick = closeModal;
    el.querySelector('#i-save').onclick = () => {
      const name = el.querySelector('#i-name').value.trim();
      if (!name) { el.querySelector('#i-name').focus(); return; }
      const obj = { id: editing ? id : uid(name), name, aisle: el.querySelector('#i-aisle').value, emoji: el.querySelector('#i-emoji').value.trim() || '🛒', staple: el.querySelector('#i-staple').checked };
      if (pendingImg) obj.img = pendingImg;
      if (editing) ingredients[ingredients.findIndex(x => x.id === id)] = obj; else ingredients.push(obj);
      if (!persist()) return;
      renderIngredients(); updateCounts(); closeModal();
    };
    if (editing) el.querySelector('#i-delete').onclick = () => {
      if (!confirm(`Delete "${it.name}"? It will be removed from any dishes that use it.`)) return;
      ingredients = ingredients.filter(x => x.id !== id);
      dishes.forEach(d => { if (d.ing) d.ing = d.ing.filter(x => x !== id); });
      delete inv[id]; saveInv();
      grocery.delete(id); saveGrocery();
      if (persist()) { renderIngredients(); renderDishes(); updateCounts(); closeModal(); }
    };
  }

  function openDishEditor(id, prefill) {
    const editing = id != null;
    const base = { name:'', type:'dinner', time:20, servings:2, emoji:'🍽️', img:null, ing:[], nutri:{kcal:0,protein:0,sodium:0,fiber:0}, veg:false, baby:{ok:false,note:''}, steps:[] };
    const d = editing ? DISH_BY_ID[id] : Object.assign(base, prefill || {});
    pendingImg = imgFor(d) || null;
    const typeOpts = ['breakfast','lunch','dinner','side','snack'].map(t => `<option ${t===d.type?'selected':''}>${t}</option>`).join('');
    const chosen = new Set(d.ing || []);
    const picker = AISLES.map(a => {
      const its = ingredients.filter(i => i.aisle === a.id);
      if (!its.length) return '';
      return `<div class="grp">${a.emoji} ${a.name}</div>` +
        its.map(i => `<label class="ing-pick"><input type="checkbox" value="${i.id}" ${chosen.has(i.id)?'checked':''}> ${i.emoji||''} ${esc(i.name)}</label>`).join('');
    }).join('');
    const el = document.getElementById('modal');
    el.innerHTML = `
      <div class="editor">
        <h2>${editing ? 'Edit dish' : 'Add a dish'}</h2>
        <div class="form-field"><label>Dish name</label><input type="text" id="d-name" value="${esc(d.name)}" placeholder="e.g. Roast Chicken"></div>
        <div class="form-row">
          <div class="form-field"><label>Type</label><select id="d-type">${typeOpts}</select></div>
          <div class="form-field" style="flex:0 0 84px"><label>Emoji</label><input type="text" id="d-emoji" value="${esc(d.emoji||'')}" maxlength="4"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Time (min)</label><input type="number" id="d-time" value="${d.time||0}" min="0"></div>
          <div class="form-field"><label>Servings</label><input type="number" id="d-serv" value="${d.servings||1}" min="1"></div>
        </div>
        <div class="form-field">
          <label>Photo (optional)</label>
          <div class="uploader">
            <div class="preview" id="d-preview">${pendingImg ? `<img src="${esc(pendingImg)}">` : (d.emoji||'🍽️')}</div>
            <div class="up-actions">
              <label class="btn file-btn">📷 Upload photo<input type="file" accept="image/*" id="d-file" style="display:none"></label>
              <button class="btn ghost" id="d-clearimg" type="button">Use emoji instead</button>
            </div>
          </div>
          <input type="text" id="d-imgurl" placeholder="…or paste an image URL" style="margin-top:8px">
        </div>
        <div class="form-field">
          <label>Ingredients</label>
          <div class="ing-picker" id="d-ings">${picker}</div>
          <div class="hint">Tick what this dish needs. Missing one? Add it on the Ingredients tab first.</div>
        </div>
        <div class="form-field"><label>Nutrition (per serving)</label>
          <div class="form-row">
            <div class="form-field"><label class="hint">Calories</label><input type="number" id="d-kcal" value="${d.nutri.kcal||0}" min="0"></div>
            <div class="form-field"><label class="hint">Protein (g)</label><input type="number" id="d-prot" value="${d.nutri.protein||0}" min="0"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label class="hint">Sodium (mg)</label><input type="number" id="d-sod" value="${d.nutri.sodium||0}" min="0"></div>
            <div class="form-field"><label class="hint">Fiber (g)</label><input type="number" id="d-fib" value="${d.nutri.fiber||0}" min="0"></div>
          </div>
        </div>
        <div class="form-field"><label class="check-line"><input type="checkbox" id="d-veg" ${d.veg?'checked':''}> 🌱 Vegetarian</label></div>
        <div class="form-field"><label class="check-line"><input type="checkbox" id="d-baby" ${d.baby&&d.baby.ok?'checked':''}> 👶 Baby-friendly (12 mo+)</label></div>
        <div class="form-field" id="d-babywrap" style="${d.baby&&d.baby.ok?'':'display:none'}">
          <label>Note for baby (safe prep / portioning)</label>
          <textarea id="d-babynote" placeholder="e.g. Mash soft, cut into finger strips, skip added salt…">${esc(d.baby?d.baby.note:'')}</textarea>
        </div>
        <div class="form-field"><label>Steps (one per line)</label><textarea id="d-steps" placeholder="Boil the pasta&#10;Make the sauce&#10;Combine and serve">${esc((d.steps||[]).join('\n'))}</textarea></div>
        <div class="btn-row">
          <button class="btn-primary" id="d-save">${editing ? 'Save changes' : 'Add dish'}</button>
          ${editing ? '<button class="btn-delete" id="d-delete">Delete</button>' : ''}
          <button class="btn-cancel" id="d-cancel">Cancel</button>
        </div>
      </div>`;
    openModalShell();
    wireUploader(el, 'd', () => el.querySelector('#d-emoji').value, '🍽️', 640);
    el.querySelector('#d-baby').onchange = e => { el.querySelector('#d-babywrap').style.display = e.target.checked ? '' : 'none'; };
    el.querySelector('#d-cancel').onclick = closeModal;
    el.querySelector('#d-save').onclick = () => {
      const name = el.querySelector('#d-name').value.trim();
      if (!name) { el.querySelector('#d-name').focus(); return; }
      const babyOn = el.querySelector('#d-baby').checked;
      const obj = {
        id: editing ? id : uid(name),
        name, type: el.querySelector('#d-type').value,
        time: +el.querySelector('#d-time').value || 0,
        servings: +el.querySelector('#d-serv').value || 1,
        emoji: el.querySelector('#d-emoji').value.trim() || '🍽️',
        ing: [...el.querySelectorAll('#d-ings input:checked')].map(c => c.value),
        nutri: { kcal:+el.querySelector('#d-kcal').value||0, protein:+el.querySelector('#d-prot').value||0, sodium:+el.querySelector('#d-sod').value||0, fiber:+el.querySelector('#d-fib').value||0 },
        veg: el.querySelector('#d-veg').checked,
        baby: { ok: babyOn, note: babyOn ? el.querySelector('#d-babynote').value.trim() : '' },
        steps: el.querySelector('#d-steps').value.split('\n').map(s => s.trim()).filter(Boolean),
      };
      if (pendingImg) obj.img = pendingImg;
      if (editing) dishes[dishes.findIndex(x => x.id === id)] = obj; else dishes.push(obj);
      if (!persist()) return;
      renderDishes(); updateCounts(); closeModal();
    };
    if (editing) el.querySelector('#d-delete').onclick = () => {
      if (!confirm(`Delete "${d.name}"? It will also be removed from any meals.`)) return;
      dishes = dishes.filter(x => x.id !== id);
      meals.forEach(m => { if (m.dishIds) m.dishIds = m.dishIds.filter(x => x !== id); });
      if (persist()) { renderDishes(); updateCounts(); closeModal(); }
    };
  }

  function openMealBuilder(id) {
    const editing = id != null;
    const m = editing ? meals.find(x => x.id === id) : { name:'', emoji:'', img:null, dishIds:[] };
    pendingImg = imgFor(m) || null;
    const chosen = new Set(m.dishIds || []);
    const order = ['breakfast','lunch','dinner','side','snack'];
    const byType = {};
    dishes.forEach(d => { (byType[d.type] = byType[d.type] || []).push(d); });
    const picker = order.filter(t => byType[t]).map(t =>
      `<div class="grp">${t}</div>` + byType[t].map(d =>
        `<label class="ing-pick"><input type="checkbox" value="${d.id}" ${chosen.has(d.id)?'checked':''}> ${d.emoji||'🍽️'} ${esc(d.name)} <small style="color:var(--muted);margin-left:auto">${d.nutri.protein}g·${d.nutri.kcal}cal</small></label>`
      ).join('')
    ).join('') || '<div class="hint" style="padding:8px">No dishes yet — add some on the Dishes tab first.</div>';
    const el = document.getElementById('modal');
    el.innerHTML = `
      <div class="editor">
        <h2>${editing ? 'Edit meal' : 'Build a meal'}</h2>
        <div class="form-field"><label>Meal name</label><input type="text" id="mb-name" value="${esc(m.name)}" placeholder="e.g. Sunday Family Dinner"></div>
        <div class="form-field" style="max-width:130px"><label>Emoji (optional)</label><input type="text" id="mb-emoji" value="${esc(m.emoji||'')}" maxlength="4" placeholder="🍽️"></div>
        <div class="form-field">
          <label>Pick dishes (a main + sides)</label>
          <div class="ing-picker" id="mb-dishes">${picker}</div>
        </div>
        <div class="form-field">
          <label>Combined nutrition &amp; coverage</label>
          <div class="nutri" id="mb-nutri"></div>
          <div class="coverage" id="mb-cov" style="margin-top:8px"></div>
        </div>
        <div class="btn-row">
          <button class="btn-primary" id="mb-save">Save meal</button>
          ${editing ? '<button class="btn-delete" id="mb-delete">Delete</button>' : ''}
          <button class="btn-cancel" id="mb-cancel">Cancel</button>
        </div>
      </div>`;
    openModalShell();
    const recompute = () => {
      const ds = [...el.querySelectorAll('#mb-dishes input:checked')].map(c => DISH_BY_ID[c.value]).filter(Boolean);
      const nutri = combinedNutri(ds);
      const meta = { nutri, veg: ds.length>0 && ds.every(d=>d.veg), baby:{ok:ds.length>0&&ds.every(d=>d.baby&&d.baby.ok)} };
      el.querySelector('#mb-nutri').innerHTML = badges(nutri);
      el.querySelector('#mb-cov').innerHTML = coverageRow(meta, ds);
    };
    el.querySelectorAll('#mb-dishes input').forEach(c => c.onchange = recompute);
    recompute();
    el.querySelector('#mb-cancel').onclick = closeModal;
    el.querySelector('#mb-save').onclick = () => {
      const name = el.querySelector('#mb-name').value.trim();
      if (!name) { el.querySelector('#mb-name').focus(); return; }
      const dishIds = [...el.querySelectorAll('#mb-dishes input:checked')].map(c => c.value);
      const obj = { id: editing ? id : uid(name, 'meal'), name, emoji: el.querySelector('#mb-emoji').value.trim(), dishIds };
      if (pendingImg) obj.img = pendingImg;
      if (editing) meals[meals.findIndex(x => x.id === id)] = obj; else meals.push(obj);
      if (!persist()) return;
      renderMeals(); updateCounts(); closeModal();
    };
    if (editing) el.querySelector('#mb-delete').onclick = () => {
      if (!confirm(`Delete "${m.name}"?`)) return;
      meals = meals.filter(x => x.id !== id);
      if (persist()) { renderMeals(); updateCounts(); closeModal(); }
    };
  }

  /* =========================================================
     WIRE UP
     ========================================================= */
  document.querySelectorAll('nav.tabs button').forEach(b => b.onclick = () => switchView(b.dataset.view));
  document.getElementById('item-search').addEventListener('input', e => { itemFilter = e.target.value; renderIngredients(); });
  document.getElementById('clear-pantry').onclick = () => {
    if (confirm('Mark every ingredient as out / not on hand?')) { inv = {}; saveInv(); renderIngredients(); updateCounts(); }
  };
  const stToggle = document.getElementById('staples-toggle');
  stToggle.checked = assumeStaples;
  stToggle.onchange = () => { assumeStaples = stToggle.checked; save(); renderIngredients(); updateCounts(); };

  document.getElementById('add-item').onclick = () => openIngredientEditor(null);
  document.getElementById('quick-add').onclick = () => openQuickAdd();
  document.getElementById('add-dish').onclick = () => openDishEditor(null);
  document.getElementById('import-dish').onclick = () => openImport();
  document.getElementById('build-meal').onclick = () => openMealBuilder(null);
  const groInput = document.getElementById('grocery-add');
  const groSubmit = () => { groceryAdd(groInput.value); groInput.value = ''; };
  document.getElementById('grocery-add-btn').onclick = groSubmit;
  groInput.addEventListener('keydown', e => { if (e.key === 'Enter') groSubmit(); });
  document.getElementById('add-builtins').onclick = () => addNewBuiltins();
  document.getElementById('data-backup').onclick = () => openDataModal();
  document.getElementById('restore-defaults').onclick = () => {
    if (!confirm('Restore the original built-in ingredients, dishes and meals?\n\nThis discards anything you’ve added or edited. Your on-hand inventory is kept.')) return;
    seedCatalog();
    if (persist()) { renderIngredients(); renderDishes(); renderMeals(); updateCounts(); }
  };

  renderGoals();
  renderIngredients();
  renderDishes();
  renderMeals();
  renderGrocery();
  updateCounts();
  document.getElementById('help-btn').onclick = () => openHelp();
  switchView('home');
  if (!localStorage.getItem(LS_SEEN)) openWelcome();
  </script>
</body>
</html>
